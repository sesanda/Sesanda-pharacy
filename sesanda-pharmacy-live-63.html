/* ---------- Reports: Sales / Purchasing / Item Ledger / P&L / Expired Write-Off ---------- */
function Reports({invoices, journal, batches, items, grns, suppliers, expenses, adjustments, notify}){
  const [reportTab,setReportTab] = useState('overview');
  const [fromDate,setFromDate] = useState(todayISO());
  const [toDate,setToDate] = useState(todayISO());
  const [cardChargePct,setCardChargePct] = useState(0);
  const [expAmount,setExpAmount] = useState('');
  const [expDesc,setExpDesc] = useState('');
  const [expDate,setExpDate] = useState(todayISO());
  const [ledgerItemId,setLedgerItemId] = useState('');
  const [ledgerQuery,setLedgerQuery] = useState('');
  const [adjQty,setAdjQty] = useState('');
  const [adjReason,setAdjReason] = useState('');

  useEffect(()=>{
    db.collection('meta').doc('settings').get().then(snap=>{
      if(snap.exists) setCardChargePct(snap.data().cardChargePercent || 0);
    });
  },[]);
  const saveCardChargePct = async (val)=>{
    setCardChargePct(val);
    await db.collection('meta').doc('settings').set({cardChargePercent:Number(val)||0}, {merge:true});
  };

  const dateOf = (ms)=> ms ? new Date(ms).toISOString().slice(0,10) : null;
  const inRange = (d)=> d && d>=fromDate && d<=toDate;

  const periodInvoices = invoices.filter(inv=> inRange(dateOf(inv.createdAtMs)));
  const periodGrns = (grns||[]).filter(g=> inRange(g.date));
  const periodExpenses = (expenses||[]).filter(e=> inRange(e.date));
  const periodLosses = (journal||[]).filter(j=> j.type==='loss' && inRange(j.date));
  const periodAdjustments = (adjustments||[]).filter(a=> inRange(a.date));

  const subtotalTotal = periodInvoices.reduce((s,inv)=>s+(inv.subtotal||0),0);
  const discountTotal = periodInvoices.reduce((s,inv)=>s+(inv.discountAmount||0),0);
  const otherChargesTotal = periodInvoices.reduce((s,inv)=>s+(inv.otherCharges||0),0);
  const netCollected = periodInvoices.reduce((s,inv)=>s+(inv.totalToPay||0),0);

  // Bills saved before cost-tracking was added won't have costTotal stored on the line —
  // estimate it from current batch cost data so older bills still count correctly toward profit.
  const estimateLineCost = (it)=>{
    if(it.costTotal!=null) return it.costTotal;
    const relevant = batches.filter(b=>b.itemId===it.itemId);
    if(relevant.length===0) return 0;
    const withStock = relevant.filter(b=>(b.remainingUnits||0)>0);
    const pool = withStock.length>0 ? withStock : relevant;
    const totalUnits = pool.reduce((s,b)=>s+(b.remainingUnits||0),0);
    const totalCost = pool.reduce((s,b)=>s+(b.remainingUnits||0)*(b.unitCost||0),0);
    const avgCost = totalUnits>0 ? totalCost/totalUnits : (pool[0].unitCost||0);
    return avgCost * (it.qty||0);
  };
  const costTotal = periodInvoices.reduce((s,inv)=> s + (inv.items||[]).reduce((ss,it)=>ss+estimateLineCost(it),0), 0);
  const cardInvoices = periodInvoices.filter(inv=>inv.payment==='card');
  const cardChargesTotal = cardInvoices.reduce((s,inv)=>s+(inv.totalToPay||0),0) * (Number(cardChargePct)||0)/100;
  const expensesTotal = periodExpenses.reduce((s,e)=>s+(e.amount||0),0);
  const lossesTotal = periodLosses.reduce((s,j)=>s+(j.amount||0),0);
  const netProfit = subtotalTotal - costTotal - cardChargesTotal - discountTotal - expensesTotal - lossesTotal;

  const purchasingTotal = periodGrns.reduce((s,g)=>s+(g.totalAmount||0),0);

  const addExpense = async ()=>{
    if(!expAmount || Number(expAmount)<=0) return notify('Amount එකක් දෙන්න');
    await db.collection('expenses').add({
      amount:Number(expAmount), description:expDesc||'Expense', date:expDate,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    notify('✓ Expense එක save කළා');
    setExpAmount(''); setExpDesc('');
  };

  const expiredBatches = batches.filter(b=> b.remainingUnits>0 && b.expiryDate && daysFromToday(b.expiryDate)<0)
    .sort((a,b)=> a.expiryDate<b.expiryDate?-1:1);
  const writeOff = async (b)=>{
    const lossAmount = (b.remainingUnits||0) * (b.unitCost||0);
    await db.collection('journal').add({
      type:'loss', reason:'expired_stock', amount: lossAmount,
      itemName:b.brandName, batchCode:b.batchCode, qty:b.remainingUnits,
      date: todayISO(), createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    await db.collection('batches').doc(b.id).update({remainingUnits:0, writtenOff:true});
    notify('🗑 ' + b.brandName + ' write-off කළා — Loss: ' + fmt(lossAmount));
  };

  const ledgerItem = items.find(it=>it.id===ledgerItemId);
  const ledgerMatches = ledgerQuery.length>0 ? items.filter(it=>it.brandName.toLowerCase().includes(ledgerQuery.toLowerCase())).slice(0,8) : [];
  // batches don't have a reliable createdAtMs field — filter using the linked GRN date instead
  const ledgerBatchesInRange = ledgerItem ? batches.filter(b=>{
    if(b.itemId!==ledgerItem.id) return false;
    const g = (grns||[]).find(g=>g.id===b.grnId);
    return g ? inRange(g.date) : false;
  }) : [];
  const ledgerSales = ledgerItem ? periodInvoices.flatMap(inv=>
    (inv.items||[]).filter(it=>it.itemId===ledgerItem.id).map(it=>({...it, billNo:inv.billNo, customerName:inv.customerName, date:dateOf(inv.createdAtMs)}))
  ) : [];
  const ledgerAdj = ledgerItem ? periodAdjustments.filter(a=>a.itemId===ledgerItem.id) : [];

  const stockForLedger = ledgerItem ? batches.filter(b=>b.itemId===ledgerItem.id).reduce((s,b)=>s+(b.remainingUnits||0),0) : 0;
  const saveAdjustment = async ()=>{
    if(!ledgerItem) return notify('Item එකක් තෝරන්න');
    const qty = Number(adjQty);
    if(!qty) return notify('Adjustment quantity එකක් දෙන්න (+ හෝ -)');
    if(qty<0){
      const short = await deductStockFEFO(ledgerItem.id, Math.abs(qty), batches);
      if(short>0) notify('⚠ Stock මදි — ' + short + ' units අඩු කරන්න බැරි වුනා');
    } else {
      // positive adjustment — add as a zero-cost adjustment batch so it shows in stock
      await db.collection('batches').add({
        batchCode:'ADJ-'+Date.now(), itemId:ledgerItem.id, brandName:ledgerItem.brandName,
        costPricePerPack:0, sellPricePerPack:0, unitCost:0, unitSell:0,
        expiryDate:'', qtyPacks:0, qtyUnits:qty, remainingUnits:qty,
        supplierId:'', supplierName:'Adjustment', invoiceNum:'', isAdjustment:true,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }
    await db.collection('adjustments').add({
      itemId:ledgerItem.id, itemName:ledgerItem.brandName, qty, reason:adjReason||'Stock adjustment',
      date: todayISO(), createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    notify('✓ Adjustment එක save කළා');
    setAdjQty(''); setAdjReason('');
  };

  const REPORT_TABS = [
    {id:'overview', label:'📈 P&L Overview'},
    {id:'sales', label:'🧾 Sales Report'},
    {id:'purchasing', label:'📦 Purchasing Report'},
    {id:'ledger', label:'📒 Item Ledger'},
    {id:'writeoff', label:'🗑 Expired Write-Off'},
  ];

  return (
    <div>
      <div className="card" style={{display:'flex', gap:8, flexWrap:'wrap'}}>
        {REPORT_TABS.map(t=>(
          <button key={t.id} className={"btn btn-sm "+(reportTab===t.id?'btn-primary':'btn-ghost')} onClick={()=>setReportTab(t.id)}>{t.label}</button>
        ))}
      </div>

      {reportTab!=='writeoff' && (
        <div className="card">
          <div className="grid c2">
            <div><label>From</label><input type="date" value={fromDate} onChange={e=>setFromDate(e.target.value)} /></div>
            <div><label>To</label><input type="date" value={toDate} onChange={e=>setToDate(e.target.value)} /></div>
          </div>
        </div>
      )}

      {reportTab==='overview' && (
        <div>
          <div className="card">
            <h3>📈 Profit / Loss ({fromDate} → {toDate})</h3>
            <div className="grid c3">
              <div className="card" style={{margin:0}}>
                <div style={{fontSize:12, color:'var(--ink-soft)'}}>Sell Price (Subtotal)</div>
                <div style={{fontSize:18, fontWeight:700}}>{fmt(subtotalTotal)}</div>
                <div style={{fontSize:11, color:'var(--ink-soft)'}}>{periodInvoices.length} bill(s)</div>
              </div>
              <div className="card" style={{margin:0}}>
                <div style={{fontSize:12, color:'var(--ink-soft)'}}>Cost Price</div>
                <div style={{fontSize:18, fontWeight:700}}>{fmt(costTotal)}</div>
              </div>
              <div className="card" style={{margin:0}}>
                <div style={{fontSize:12, color:'var(--ink-soft)'}}>Discounts Given</div>
                <div style={{fontSize:18, fontWeight:700, color:'var(--red)'}}>{fmt(discountTotal)}</div>
              </div>
              <div className="card" style={{margin:0}}>
                <div style={{fontSize:12, color:'var(--ink-soft)'}}>Card Charges ({cardChargePct}%)</div>
                <div style={{fontSize:18, fontWeight:700, color:'var(--red)'}}>{fmt(cardChargesTotal)}</div>
                <div style={{fontSize:11, color:'var(--ink-soft)'}}>{cardInvoices.length} card bill(s)</div>
              </div>
              <div className="card" style={{margin:0}}>
                <div style={{fontSize:12, color:'var(--ink-soft)'}}>Other Expenses</div>
                <div style={{fontSize:18, fontWeight:700, color:'var(--red)'}}>{fmt(expensesTotal)}</div>
              </div>
              <div className="card" style={{margin:0}}>
                <div style={{fontSize:12, color:'var(--ink-soft)'}}>Write-off Losses</div>
                <div style={{fontSize:18, fontWeight:700, color:'var(--red)'}}>{fmt(lossesTotal)}</div>
              </div>
            </div>
            <div style={{marginTop:16, borderTop:'1px solid var(--line)', paddingTop:14, display:'flex', justifyContent:'space-between'}}>
              <span style={{fontSize:16, fontWeight:700}}>Net Profit</span>
              <span style={{fontSize:22, fontWeight:700, color: netProfit>=0?'var(--green)':'var(--red)'}}>{fmt(netProfit)}</span>
            </div>
            <p style={{fontSize:11, color:'var(--ink-soft)', marginTop:10}}>
              Net Profit = Sell Price − Cost Price − Card Charges − Discount − Other Expenses − Write-off Losses.
              (Net collected from customers, after discount + delivery/other charges added: {fmt(netCollected)})
            </p>
          </div>

          <div className="card">
            <h3>⚙️ Card Payment Charge %</h3>
            <div style={{display:'flex', gap:10, alignItems:'flex-end'}}>
              <div style={{maxWidth:150}}><label>Charge %</label>
                <input type="number" value={cardChargePct} onChange={e=>saveCardChargePct(e.target.value)} /></div>
              <p style={{fontSize:11.5, color:'var(--ink-soft)', margin:0}}>Bank/card machine commission % — Card bills වල totalToPay එකෙන් auto-calculate වෙනවා.</p>
            </div>
          </div>

          <div className="card">
            <h3>💸 Other Expenses</h3>
            <div className="grid c3">
              <div><label>Date</label><input type="date" value={expDate} onChange={e=>setExpDate(e.target.value)} /></div>
              <div><label>Amount (Rs.)</label><input type="number" value={expAmount} onChange={e=>setExpAmount(e.target.value)} /></div>
              <div><label>Description</label><input value={expDesc} onChange={e=>setExpDesc(e.target.value)} placeholder="Rent, transport, wages..." /></div>
            </div>
            <button className="btn btn-primary btn-sm" style={{marginTop:10}} onClick={addExpense}>+ Add Expense</button>
            <table style={{marginTop:14}}>
              <thead><tr><th>Date</th><th>Description</th><th>Amount</th></tr></thead>
              <tbody>
                {periodExpenses.length===0 ? <tr><td colSpan="3" style={{textAlign:'center', color:'var(--ink-soft)'}}>Expenses නැහැ</td></tr> :
                periodExpenses.map(e=>(<tr key={e.id}><td>{e.date}</td><td>{e.description}</td><td>{fmt(e.amount)}</td></tr>))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {reportTab==='sales' && (
        <div className="card">
          <h3>🧾 Sales Report ({fromDate} → {toDate})</h3>
          <div className="grid c3" style={{marginBottom:14}}>
            <div className="card" style={{margin:0}}><div style={{fontSize:12,color:'var(--ink-soft)'}}>Total Sales</div><div style={{fontSize:18,fontWeight:700}}>{fmt(netCollected)}</div></div>
            <div className="card" style={{margin:0}}><div style={{fontSize:12,color:'var(--ink-soft)'}}>Bills</div><div style={{fontSize:18,fontWeight:700}}>{periodInvoices.length}</div></div>
            <div className="card" style={{margin:0}}><div style={{fontSize:12,color:'var(--ink-soft)'}}>Avg. Bill Value</div><div style={{fontSize:18,fontWeight:700}}>{fmt(periodInvoices.length? netCollected/periodInvoices.length:0)}</div></div>
          </div>
          <table>
            <thead><tr><th>Bill No</th><th>Date</th><th>Customer</th><th>Payment</th><th>Total</th></tr></thead>
            <tbody>
              {periodInvoices.length===0? <tr><td colSpan="5" style={{textAlign:'center', color:'var(--ink-soft)'}}>Bills නැහැ</td></tr> :
              periodInvoices.slice().sort((a,b)=>(b.createdAtMs||0)-(a.createdAtMs||0)).map(inv=>(
                <tr key={inv.id}><td>{inv.billNo}</td><td>{dateOf(inv.createdAtMs)}</td><td>{inv.customerName}</td>
                  <td>{inv.payment}</td><td>{fmt(inv.totalToPay)}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {reportTab==='purchasing' && (
        <div className="card">
          <h3>📦 Purchasing Report ({fromDate} → {toDate})</h3>
          <div className="grid c3" style={{marginBottom:14}}>
            <div className="card" style={{margin:0}}><div style={{fontSize:12,color:'var(--ink-soft)'}}>Total Purchases</div><div style={{fontSize:18,fontWeight:700}}>{fmt(purchasingTotal)}</div></div>
            <div className="card" style={{margin:0}}><div style={{fontSize:12,color:'var(--ink-soft)'}}>GRNs</div><div style={{fontSize:18,fontWeight:700}}>{periodGrns.length}</div></div>
            <div className="card" style={{margin:0}}><div style={{fontSize:12,color:'var(--ink-soft)'}}>Unpaid (Credit)</div><div style={{fontSize:18,fontWeight:700, color:'var(--red)'}}>{fmt(periodGrns.filter(g=>g.payment==='credit'&&!g.paid).reduce((s,g)=>s+(g.totalAmount||0),0))}</div></div>
          </div>
          <table>
            <thead><tr><th>GRN No</th><th>Date</th><th>Supplier</th><th>Payment</th><th>Total</th></tr></thead>
            <tbody>
              {periodGrns.length===0? <tr><td colSpan="5" style={{textAlign:'center', color:'var(--ink-soft)'}}>GRNs නැහැ</td></tr> :
              periodGrns.slice().sort((a,b)=> b.date<a.date?-1:1).map(g=>(
                <tr key={g.id}><td>{g.grnNo}</td><td>{g.date}</td><td>{g.supplierName}</td>
                  <td>{g.payment}{g.payment==='credit' && (g.paid? ' (paid)':' (due)')}</td><td>{fmt(g.totalAmount)}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {reportTab==='ledger' && (
        <div>
          <div className="card">
            <h3>📒 Item Ledger</h3>
            <div className="autocomplete">
              <label>Select Item</label>
              <input value={ledgerItem? ledgerItem.brandName : ledgerQuery}
                onChange={e=>{setLedgerQuery(e.target.value); setLedgerItemId('');}}
                placeholder="type brand name..." />
              {!ledgerItem && ledgerMatches.length>0 && (
                <div className="ac-list">
                  {ledgerMatches.map(m=>(
                    <div key={m.id} className="ac-item" onMouseDown={()=>{setLedgerItemId(m.id); setLedgerQuery('');}}>
                      <b>{m.itemNumber}</b> — {m.brandName}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {ledgerItem && (
            <React.Fragment>
              <div className="card">
                <h3>{ledgerItem.brandName} — Current Stock: {stockForLedger} {ledgerItem.unit}</h3>
                <div className="grid c3">
                  <div><label>Adjustment Qty (+/-)</label><input type="number" value={adjQty} onChange={e=>setAdjQty(e.target.value)} placeholder="e.g. -5 or 10" /></div>
                  <div style={{gridColumn:'span 2'}}><label>Reason</label><input value={adjReason} onChange={e=>setAdjReason(e.target.value)} placeholder="damaged, stock count correction..." /></div>
                </div>
                <button className="btn btn-primary btn-sm" style={{marginTop:10}} onClick={saveAdjustment}>+ Record Adjustment</button>
              </div>

              <div className="card">
                <h3>📥 Purchasing Details ({fromDate} → {toDate})</h3>
                <table>
                  <thead><tr><th>Batch</th><th>Supplier</th><th>Pkt Qty</th><th>Pkt Cost</th><th>Expiry</th></tr></thead>
                  <tbody>
                    {ledgerBatchesInRange.length===0? <tr><td colSpan="5" style={{textAlign:'center', color:'var(--ink-soft)'}}>Purchases නැහැ</td></tr> :
                    ledgerBatchesInRange.map(b=>(
                      <tr key={b.id}><td>{b.batchCode}</td><td>{b.supplierName}</td><td>{b.qtyPacks}</td>
                        <td>{fmt(b.costPricePerPack)}</td><td>{b.expiryDate}</td></tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div className="card">
                <h3>⚖️ Adjustment Details</h3>
                <table>
                  <thead><tr><th>Date</th><th>Qty</th><th>Reason</th></tr></thead>
                  <tbody>
                    {ledgerAdj.length===0? <tr><td colSpan="3" style={{textAlign:'center', color:'var(--ink-soft)'}}>Adjustments නැහැ</td></tr> :
                    ledgerAdj.map(a=>(<tr key={a.id}><td>{a.date}</td><td style={{color:a.qty<0?'var(--red)':'var(--green)'}}>{a.qty>0?'+':''}{a.qty}</td><td>{a.reason}</td></tr>))}
                  </tbody>
                </table>
              </div>

              <div className="card">
                <h3>💰 Selling Details</h3>
                <table>
                  <thead><tr><th>Bill No</th><th>Date</th><th>Customer</th><th>Qty</th><th>Amount</th></tr></thead>
                  <tbody>
                    {ledgerSales.length===0? <tr><td colSpan="5" style={{textAlign:'center', color:'var(--ink-soft)'}}>Sales නැහැ</td></tr> :
                    ledgerSales.map((s,i)=>(<tr key={i}><td>{s.billNo}</td><td>{s.date}</td><td>{s.customerName}</td><td>{s.qty}</td><td>{fmt(s.lineTotal)}</td></tr>))}
                  </tbody>
                </table>
              </div>
            </React.Fragment>
          )}
        </div>
      )}

      {reportTab==='writeoff' && (
        <div className="card">
          <h3 style={{color:'var(--red)'}}>🗑 Expired Stock Write-Off</h3>
          {expiredBatches.length===0 ? <div className="empty">Expired වූ stock නැහැ</div> :
          expiredBatches.map(b=>(
            <div key={b.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center',
              padding:'10px 4px', borderBottom:'1px solid var(--line)'}}>
              <div>
                <b>{b.brandName}</b> <span style={{fontSize:12, color:'var(--ink-soft)'}}>({b.batchCode})</span>
                <div style={{fontSize:12, color:'var(--red)'}}>Expired {b.expiryDate} — {b.remainingUnits} units — Loss: {fmt((b.remainingUnits||0)*(b.unitCost||0))}</div>
              </div>
              <button className="btn btn-danger btn-sm" onClick={()=>writeOff(b)}>🗑 Write Off</button>
            </div>
          ))}
          <p style={{fontSize:11, color:'var(--ink-soft)', marginTop:8}}>
            Write off කළාම stock එකෙන් ඉවත් වෙලා, "Loss" ලෙස journal entry එකක් auto-record වෙනවා (P&L එකෙන් අඩු වෙනවා).
          </p>
        </div>
      )}
    </div>
  );
}

/* ========================================================================
   CUSTOMER APP
   ======================================================================== */
function CustomerApp({onExit}){
  const [profile,setProfile] = useState(null);
  const [tab,setTab] = useState('shop');
  const [cart,setCart] = useState({});
  const [toast,setToast] = useState(null);
  const notify = m=>{ setToast(m); setTimeout(()=>setToast(null),2800); };

  const [items] = useCollection('items');
  const [batches] = useCollection('batches');
  const [myOrders] = useCollection('orders');
  const [invoices] = useCollection('invoices');
  const [specialOrders] = useCollection('specialOrders');
  const [vitals] = useCollection('vitals');
  const [healthReports] = useCollection('healthReports');

  if(!profile) return <CustomerLogin onDone={setProfile} onExit={onExit} />;

  const stockFor = (itemId)=> batches.filter(b=>b.itemId===itemId).reduce((s,b)=>s+(b.remainingUnits||0),0);
  const priceFor = (itemId)=>{
    const bs = batches.filter(b=>b.itemId===itemId && b.remainingUnits>0).sort((a,b)=>(a.expiryDate||'')<(b.expiryDate||'')?-1:1);
    return bs[0]? bs[0].unitSell : 0;
  };

  const cartCount = Object.values(cart).reduce((s,q)=>s+q,0);
  const cartLines = Object.entries(cart).filter(([,q])=>q>0).map(([itemId,qty])=>{
    const it = items.find(i=>i.id===itemId);
    return {itemId, brandName:it?.brandName, unit:it?.unit, qty, unitPrice: priceFor(itemId), lineTotal: qty*priceFor(itemId)};
  });
  const cartTotal = cartLines.reduce((s,l)=>s+l.lineTotal,0);

  const placeOrder = async ()=>{
    if(cartLines.length===0) return notify('Cart එක හිස්');
    await db.collection('orders').add({
      customerId: profile.id||null, customerName: profile.name, customerTel: profile.tel,
      items: cartLines, totalAmount: cartTotal, status:'ordered',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      createdAtMs: Date.now(),
    });
    setCart({}); beep(); notify('✓ Order has been sent — ඔබේ ඇණවුම යැව්වා!'); setTab('orders');
  };

  const myOrderHistory = myOrders.filter(o=> o.customerTel===profile.tel).sort((a,b)=>(b.createdAtMs||0)-(a.createdAtMs||0));
  const myBills = invoices.filter(inv=> inv.customerTel===profile.tel).sort((a,b)=>(b.createdAtMs||0)-(a.createdAtMs||0));
  const mySpecial = specialOrders.filter(s=> s.customerTel===profile.tel).sort((a,b)=>(b.createdAtMs||0)-(a.createdAtMs||0));
  const myVitals = vitals.filter(v=> v.customerTel===profile.tel).sort((a,b)=>(a.createdAtMs||0)-(b.createdAtMs||0));
  const myReports = healthReports.filter(r=> r.customerTel===profile.tel).sort((a,b)=>(b.createdAtMs||0)-(a.createdAtMs||0));

  return (
    <div className="cust-shell">
      <div className="cust-top">
        <div><b>Sesanda Pharmacy</b><div style={{fontSize:11, opacity:.8}}>{profile.name}</div></div>
        <button onClick={onExit} style={{background:'none',border:'none',color:'#fff',fontSize:13}}>Exit</button>
      </div>
      <div className="cust-body">
        {tab==='shop' && <ShopTab items={items} stockFor={stockFor} priceFor={priceFor} cart={cart} setCart={setCart} notify={notify} onGoToCart={()=>setTab('cart')} />}
        {tab==='cart' && <CartTab lines={cartLines} total={cartTotal} setCart={setCart} onPlace={placeOrder} />}
        {tab==='orders' && <OrdersTab orders={myOrderHistory} />}
        {tab==='bills' && <BillsTab bills={myBills} />}
        {tab==='special' && <SpecialOrderTab profile={profile} requests={mySpecial} notify={notify} />}
        {tab==='health' && <HealthTab profile={profile} vitals={myVitals} reports={myReports} notify={notify} onGoToShop={()=>setTab('shop')} />}
      </div>
      <div className="cust-tabs">
        <button className={tab==='shop'?'active':''} onClick={()=>setTab('shop')}><span className="ic">🏪</span>Shop</button>
        <button className={tab==='cart'?'active':''} onClick={()=>setTab('cart')}>
          <span className="fab-wrap"><span className="ic">🛒</span>{cartCount>0 && <span className="badge">{cartCount}</span>}</span>Cart
        </button>
        <button className={tab==='orders'?'active':''} onClick={()=>setTab('orders')}><span className="ic">📦</span>Orders</button>
        <button className={tab==='bills'?'active':''} onClick={()=>setTab('bills')}><span className="ic">🧾</span>Bills</button>
        <button className={tab==='special'?'active':''} onClick={()=>setTab('special')}><span className="ic">🩺</span>Rx</button>
        <button className={tab==='health'?'active':''} onClick={()=>setTab('health')}><span className="ic">❤️‍🩹</span>Health</button>
      </div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function CustomerLogin({onDone,onExit}){
  const [name,setName] = useState(''); const [tel,setTel] = useState('');
  return (
    <div className="gate">
      <div className="gate-card">
        <div className="gate-mark"><img src={window.APP_LOGO} alt="Sesanda Pharmacy" /></div>
        <h1>ආයුබෝවන්!</h1>
        <p>ඔබේ නම සහ දුරකථන අංකය දෙන්න</p>
        <div style={{textAlign:'left', marginBottom:12}}>
          <label>Name</label><input value={name} onChange={e=>setName(e.target.value)} />
        </div>
        <div style={{textAlign:'left', marginBottom:16}}>
          <label>Tel No</label><input value={tel} onChange={e=>setTel(e.target.value)} placeholder="07XXXXXXXX" />
        </div>
        <button className="btn btn-primary" style={{width:'100%'}} disabled={!name||!tel}
          onClick={()=>onDone({name,tel})}>Continue</button>
        <button className="btn btn-ghost" style={{width:'100%', marginTop:10}} onClick={onExit}>← Back</button>
      </div>
    </div>
  );

function ShopTab({items, stockFor, priceFor, cart, setCart, notify, onGoToCart}){
  const [q,setQ] = useState('');
  const [justScannedId,setJustScannedId] = useState(null);
  const filtered = items
    .filter(it=> it.brandName.toLowerCase().includes(q.toLowerCase()) || it.genericName.toLowerCase().includes(q.toLowerCase()))
    .sort((a,b)=>{
      const sa = stockFor(a.id)>0 ? 0 : 1;
      const sb = stockFor(b.id)>0 ? 0 : 1;
      if(sa!==sb) return sa-sb; // in-stock items first
      return a.brandName.localeCompare(b.brandName);
    });

  const cartLines = Object.entries(cart).filter(([,qty])=>qty>0);
  const cartCount = cartLines.reduce((s,[,qty])=>s+qty, 0);
  const cartTotal = cartLines.reduce((s,[id,qty])=> s + qty*priceFor(id), 0);

  const handleScanMatch = (item)=>{
    setQ(item.brandName);
    setJustScannedId(item.id);
    const stock = stockFor(item.id);
    if(stock>0){
      setCart(c=>{
        const current = c[item.id]||0;
        return current<stock ? {...c, [item.id]: current+1} : c;
      });
    }
  };

  return (
    <div>
      <div style={{display:'flex', gap:8, marginBottom:10}}>
        <input placeholder="🔍 Search medicine..." value={q} onChange={e=>{setQ(e.target.value); setJustScannedId(null);}} style={{flex:1}} />
        <ItemScanButton items={items} notify={notify} showGallery
          onMatch={handleScanMatch}
          onGuess={(text)=>{setQ(text); setJustScannedId(null);}} />
      </div>

      {cartCount>0 && (
        <div className="card" style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 16px', marginBottom:14,
          background:'var(--teal-100)', border:'1.5px solid var(--teal-500)'}}>
          <div>
            <div style={{fontSize:11.5, color:'var(--ink-soft)'}}>{cartCount} item(s) in cart</div>
            <div style={{fontSize:18, fontWeight:700, color:'var(--accent)'}}>Total: {fmt(cartTotal)}</div>
          </div>
          <button className="btn btn-primary btn-sm" onClick={onGoToCart}>🛒 Cart එකට යන්න</button>
        </div>
      )}

      {filtered.length===0 && <div className="empty">Items හමු නොවුනා</div>}
      {filtered.map(it=>(
        <ProductCard key={it.id} it={it} stock={stockFor(it.id)} price={priceFor(it.id)}
          qty={cart[it.id]||0} setCart={setCart} highlighted={it.id===justScannedId} />
      ))}
    </div>
  );
}

function ProductCard({it, stock, price, qty, setCart, highlighted}){
  const [mode,setMode] = useState('tablet'); // 'pack' | 'tablet'
  const showPackToggle = (it.packSize||1) > 1;
  const step = mode==='pack' ? it.packSize : 1;
  const lineTotal = qty*price;
  const packsHeld = it.packSize ? Math.floor(qty / it.packSize) : 0;
  const remainderUnits = it.packSize ? qty % it.packSize : qty;
  const displayQty = mode==='pack' ? packsHeld : qty;
  const unitLabel = it.unit==='tablets'||it.unit==='capsules'? it.unit.slice(0,-1) : it.unit;

  const setQty = (newQty)=> setCart(c=>({...c, [it.id]: Math.max(0, Math.min(stock, newQty))}));
  const inc = ()=> setQty(qty + step);
  const dec = ()=> setQty(qty - step);

  return (
    <div className="prod-card" style={highlighted?{border:'2px solid var(--teal-500)', background:'var(--teal-100)'}:{}}>
      <div className="prod-info">
        {highlighted && <span className="tag ok" style={{marginBottom:4, width:'fit-content'}}>✓ Scanned</span>}
        <b>{it.brandName}</b>
        <span className="generic">{it.genericName}</span>
        <span className="price">{fmt(price)} / {unitLabel}</span>
        <span className={"tag "+(stock===0?'out':stock<=20?'low':'ok')} style={{marginTop:4}}>
          {stock===0?'Out of stock':stock+' available'}
        </span>
        {showPackToggle && stock>0 && (
          <div style={{display:'flex', gap:6, marginTop:6}}>
            <button className={"btn btn-sm "+(mode==='pack'?'btn-primary':'btn-ghost')} onClick={()=>setMode('pack')}>📦 Pack ({it.packSize})</button>
            <button className={"btn btn-sm "+(mode==='tablet'?'btn-primary':'btn-ghost')} onClick={()=>setMode('tablet')}>💊 {unitLabel}</button>
          </div>
        )}
        {qty>0 && (
          <div style={{marginTop:6}}>
            <span style={{fontSize:11.5, color:'var(--ink-soft)'}}>
              {showPackToggle && packsHeld>0
                ? `${packsHeld} pack(s)${remainderUnits>0? ' + '+remainderUnits+' '+it.unit:''}`
                : `${qty} ${it.unit}`}
            </span>
            <div style={{fontSize:13.5, fontWeight:700, color:'var(--accent-2)'}}>Cost: {fmt(lineTotal)}</div>
          </div>
        )}
      </div>
      {stock>0 && (
        <div className="qty-ctl">
          <button onClick={dec}>−</button>
          <span style={{minWidth:18, textAlign:'center', fontWeight:700}}>{displayQty}</span>
          <button onClick={inc} disabled={qty>=stock}>+</button>
        </div>
      )}
    </div>
  );
}

function SpecialOrderTab({profile, requests, notify}){
  const [mode,setMode] = useState('image'); // 'image' | 'voice'
  const [note,setNote] = useState('');
  const [imageFile,setImageFile] = useState(null);
  const [imagePreview,setImagePreview] = useState(null);
  const [recording,setRecording] = useState(false);
  const [recSeconds,setRecSeconds] = useState(0);
  const [audioBlob,setAudioBlob] = useState(null);
  const [audioUrl,setAudioUrl] = useState(null);
  const [sending,setSending] = useState(false);
  const fileInputRef = useRef(null);
  const mediaRecorderRef = useRef(null);
  const chunksRef = useRef([]);
  const recTimerRef = useRef(null);
  const MAX_REC_SECONDS = 40; // keeps the base64 voice note small enough for a Firestore doc

  const pickImage = (e)=>{
    const file = e.target.files[0]; if(!file) return;
    setImageFile(file); setImagePreview(URL.createObjectURL(file));
  };

  const startRecording = async ()=>{
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const mr = new MediaRecorder(stream);
      mediaRecorderRef.current = mr; chunksRef.current = [];
      mr.ondataavailable = e=> chunksRef.current.push(e.data);
      mr.onstop = ()=>{
        const blob = new Blob(chunksRef.current, {type:'audio/webm'});
        setAudioBlob(blob); setAudioUrl(URL.createObjectURL(blob));
        stream.getTracks().forEach(t=>t.stop());
        clearInterval(recTimerRef.current);
      };
      mr.start(); setRecording(true); setRecSeconds(0);
      recTimerRef.current = setInterval(()=>{
        setRecSeconds(s=>{
          if(s+1 >= MAX_REC_SECONDS){ mr.stop(); setRecording(false); }
          return s+1;
        });
      }, 1000);
    } catch(err){ notify('Microphone access ලැබුනේ නැහැ'); }
  };
  const stopRecording = ()=>{ mediaRecorderRef.current && mediaRecorderRef.current.stop(); setRecording(false); clearInterval(recTimerRef.current); };

  const reset = ()=>{ setNote(''); setImageFile(null); setImagePreview(null); setAudioBlob(null); setAudioUrl(null); setRecSeconds(0); };

  const send = async ()=>{
    if(mode==='image' && !imageFile) return notify('පින්තූරයක් තෝරන්න');
    if(mode==='voice' && !audioBlob) return notify('Voice note එකක් record කරන්න');
    setSending(true);
    try{
      let fileData = null;
      if(mode==='image'){
        fileData = await imageFileToCompressedBase64(imageFile);
      } else {
        fileData = await blobToBase64(audioBlob);
      }
      if(fileData && fileData.length > 900000){
        setSending(false);
        return notify('File එක ඉතාම විශාලයි — කෙටි photo/voice එකකින් try කරන්න');
      }
      await db.collection('specialOrders').add({
        customerName: profile.name, customerTel: profile.tel, type: mode, fileData, note,
        status:'pending_approval', createdAt: firebase.firestore.FieldValue.serverTimestamp(), createdAtMs: Date.now(),
      });
      notify('✓ යැව්වා — pharmacy staff review කරලා approve කරයි');
      reset();
    } catch(err){ console.error(err); notify('යැවීමේ දෝෂයක්'); }
    setSending(false);
  };

  return (
    <div>
      <div className="card">
        <h3>🩺 Prescription / Voice Order</h3>
        <p style={{fontSize:12.5, color:'var(--ink-soft)', marginTop:-6, marginBottom:14}}>
          බෙහෙත් තුණ්ඩුවක ඡායාරූපයක් හෝ Voice note එකක් යවන්න — staff review කරලා bill එක හදයි.
        </p>
        <div style={{display:'flex', gap:8, marginBottom:14}}>
          <button className={"btn btn-sm "+(mode==='image'?'btn-primary':'btn-ghost')} onClick={()=>{setMode('image'); reset();}}>📷 Image</button>
          <button className={"btn btn-sm "+(mode==='voice'?'btn-primary':'btn-ghost')} onClick={()=>{setMode('voice'); reset();}}>🎤 Voice</button>
        </div>

        {mode==='image' && (
          <div>
            <input ref={fileInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={pickImage} />
            <button className="btn btn-ghost" style={{width:'100%'}} onClick={()=>fileInputRef.current.click()}>
              {imagePreview? 'Change photo' : '📷 Take / choose photo'}
            </button>
            {imagePreview && <img src={imagePreview} style={{maxWidth:'100%', borderRadius:10, marginTop:10}} />}
          </div>
        )}

        {mode==='voice' && (
          <div>
            {!recording && !audioUrl && <button className="btn btn-amber" style={{width:'100%'}} onClick={startRecording}>🎤 Start Recording</button>}
            {recording && (
              <div>
                <button className="btn btn-danger" style={{width:'100%'}} onClick={stopRecording}>⏹ Stop Recording ({recSeconds}s / {MAX_REC_SECONDS}s)</button>
                <p style={{fontSize:11, color:'var(--ink-soft)', textAlign:'center', marginTop:6}}>File size අඩුව තියාගන්න තත්පර {MAX_REC_SECONDS}කින් auto-stop වෙනවා</p>
              </div>
            )}
            {audioUrl && !recording && (
              <div style={{marginTop:10}}>
                <audio controls src={audioUrl} style={{width:'100%'}}></audio>
                <button className="btn btn-ghost btn-sm" style={{marginTop:8}} onClick={()=>{setAudioBlob(null); setAudioUrl(null);}}>Re-record</button>
              </div>
            )}
          </div>
        )}

        <div style={{marginTop:14}}>
          <label>Note (optional)</label>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="e.g. ළමයෙක්ට කැස්ස බේතක්..." />
        </div>
        <button className="btn btn-primary" style={{width:'100%', marginTop:14}} disabled={sending} onClick={send}>
          {sending? 'Sending…' : '📨 Send to Pharmacy'}
        </button>
      </div>

      <div className="card">
        <h3>My Requests</h3>
        {requests.length===0? <div className="empty">තවම requests නැහැ</div> :
        requests.map(r=>(
          <div key={r.id} style={{padding:'10px 4px', borderBottom:'1px solid var(--line)'}}>
            <div style={{display:'flex', justifyContent:'space-between'}}>
              <span>{r.type==='image'?'📷 Prescription':'🎤 Voice'} — {r.createdAtMs? new Date(r.createdAtMs).toLocaleDateString():''}</span>
              <span className={"tag "+(r.status==='pending_approval'?'pending':r.status==='approved'?'done':'out')}>
                {r.status==='pending_approval'?'Pending Approval':r.status==='approved'?'Approved':'Rejected'}
              </span>
            </div>
            {r.status==='rejected' && r.rejectionNote && <div style={{fontSize:12, color:'var(--red)', marginTop:4}}>{r.rejectionNote}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Health Tab: AI Medical Report Analyzer & Vitals Tracker ---------- */
function VitalsChart({vitals, field, label, color}){
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const points = vitals.filter(v=> v[field]!=null).map(v=>({x: v.date, y: v[field]}));

  useEffect(()=>{
    if(!canvasRef.current || typeof Chart==='undefined') return;
    if(chartRef.current) chartRef.current.destroy();
    if(points.length===0) return;
    chartRef.current = new Chart(canvasRef.current, {
      type:'line',
      data:{ labels: points.map(p=>p.x), datasets:[{
        label, data: points.map(p=>p.y), borderColor: color, backgroundColor: color+'33',
        tension:0.3, fill:true, pointRadius:3,
      }]},
      options:{
        responsive:true, plugins:{legend:{display:false}},
        scales:{ x:{ticks:{color:'#93A6CC', font:{size:10}}, grid:{color:'#233254'}},
                 y:{ticks:{color:'#93A6CC', font:{size:10}}, grid:{color:'#233254'}} },
      }
    });
    return ()=>{ if(chartRef.current) chartRef.current.destroy(); };
  },[JSON.stringify(points)]);

  if(points.length===0) return null;
  return <div style={{marginBottom:16}}><p style={{fontSize:12.5, fontWeight:600, marginBottom:6}}>{label}</p><canvas ref={canvasRef} height="140"></canvas></div>;
}

function HealthTab({profile, vitals, reports, notify, onGoToShop}){
  const [subTab,setSubTab] = useState('vitals'); // 'vitals' | 'upload' | 'history'
  const [fbs,setFbs] = useState(''); const [systolic,setSystolic] = useState('');

  const [vDate,setVDate] = useState(todayISO());
  const [saving,setSaving] = useState(false);
  const [reportFiles,setReportFiles] = useState([]); // [{file, preview, isPdf}]
  const [analyzing,setAnalyzing] = useState(false);
  const [selectedForCombine,setSelectedForCombine] = useState({});
  const [combining,setCombining] = useState(false);
  const [combinedResult,setCombinedResult] = useState(null);
  const fileInputRef = useRef(null);
  const pdfInputRef = useRef(null);

  const abnormalRecent = reports.find(r=> r.hasAbnormal) || (vitals.some(v=> v.fbs>100 || v.systolic>130) ? {fromVitals:true} : null);

  const saveVitals = async ()=>{
    if(!fbs && !systolic && !pulse) return notify('අඩුම තරමින් අගයක් දෙන්න');
    setSaving(true);
    await db.collection('vitals').add({
      customerTel: profile.tel, date: vDate,
      fbs: fbs? Number(fbs): null, systolic: systolic? Number(systolic): null,
      diastolic: diastolic? Number(diastolic): null, pulse: pulse? Number(pulse): null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(), createdAtMs: Date.now(),
    });
    notify('✓ Vitals save කළා');
    setFbs(''); setSystolic(''); setDiastolic(''); setPulse('');
    setSaving(false);
  };

  const addImages = (e)=>{
    const files = Array.from(e.target.files||[]); e.target.value = '';
    if(files.length===0) return;
    setReportFiles(rf=>[...rf, ...files.map(f=>({file:f, preview:URL.createObjectURL(f), isPdf:false}))]);
  };
  const addPdf = (e)=>{
    const file = e.target.files[0]; e.target.value = '';
    if(!file) return;
    setReportFiles(rf=>[...rf, {file, preview:null, isPdf:true}]);
  };
  const removeReportFile = (i)=> setReportFiles(rf=> rf.filter((_,idx)=>idx!==i));

  const analyzeReport = async ()=>{
    if(reportFiles.length===0) return notify('Report photo(s) හෝ PDF එකක් තෝරන්න');
    if(!geminiReady){ notify('AI Report Analyzer setup වෙලා නැහැ — file එකේ top එකේ GEMINI_API_KEY දාන්න'); return; }
    setAnalyzing(true);
    try{
      // multiple photos (e.g. a long ECG strip split into segments) or a PDF all go in as one report
      const perFileQuality = reportFiles.length>1 ? {maxDim:800, quality:0.55} : {maxDim:1000, quality:0.7};
      const fileParts = [];
      const thumbnails = [];
      for(const rf of reportFiles){
        if(rf.isPdf){
          const dataUrl = await blobToBase64(rf.file);
          fileParts.push({ mimeType:'application/pdf', data: dataUrl.split(',')[1] });
        } else {
          const dataUrl = await imageFileToCompressedBase64(rf.file, perFileQuality.maxDim, perFileQuality.quality);
          fileParts.push({ mimeType:'image/jpeg', data: dataUrl.split(',')[1] });
          thumbnails.push(dataUrl);
        }
      }
      const result = await analyzeHealthReportWithGemini(fileParts);
      await db.collection('healthReports').add({
        customerTel: profile.tel, imagesData: thumbnails, pageCount: reportFiles.length,
        tests: result.tests||[], summary: result.summary||'', hasAbnormal: !!result.hasAbnormal,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(), createdAtMs: Date.now(),
      });
      notify('✓ Report විශ්ලේෂණය කළා (' + reportFiles.length + ' file(s) එකට combine කරලා)');
      setReportFiles([]);
      setSubTab('history');
    } catch(err){ console.error(err); notify('AI analysis දෝෂය: ' + (err.message||'unknown') + ' — නැවත try කරන්න'); }
    setAnalyzing(false);
  };

  const toggleCombine = (id)=> setSelectedForCombine(s=>({...s, [id]: !s[id]}));
  const combineSelected = async ()=>{
    const selected = reports.filter(r=>selectedForCombine[r.id]);
    if(selected.length<2) return notify('අඩුම තරමින් reports 2ක් තෝරන්න');
    setCombining(true); setCombinedResult(null);
    try{
      const list = selected.slice().sort((a,b)=>(a.createdAtMs||0)-(b.createdAtMs||0))
        .map(r=>({date: r.createdAtMs? new Date(r.createdAtMs).toLocaleDateString():'', summary:r.summary, tests:r.tests}));
      const result = await analyzeCombinedReportsWithGemini(list);
      setCombinedResult(result);
      await db.collection('combinedAnalyses').add({
        customerTel: profile.tel, reportIds: selected.map(r=>r.id),
        trend: result.trend||'', combinedConclusion: result.combinedConclusion||'',
        attentionPoints: result.attentionPoints||[], hasAbnormal: !!result.hasAbnormal,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(), createdAtMs: Date.now(),
      });
      notify('✓ Combined analysis ready');
    } catch(err){ console.error(err); notify('Combined analysis දෝෂය: ' + (err.message||'unknown')); }
    setCombining(false);
  };

  return (
    <div>
      {abnormalRecent && (
        <div className="card" style={{border:'1.5px solid var(--red)', background:'rgba(214,69,69,.12)'}}>
          <b style={{color:'#FF9494'}}>💊 Medicine Reminder</b>
          <p style={{fontSize:12.5, margin:'6px 0 10px'}}>ඔබේ මෑත වාර්තාවේ අගයක් normal range එකෙන් එළියට ගිහින් තියෙනවා. ඔබේ නිතිපතා බෙහෙත් (sugar/pressure) වේලාවට ගන්නවද කියලා check කරලා, අවශ්‍ය නම් reorder කරන්න.</p>
          <button className="btn btn-primary btn-sm" onClick={onGoToShop}>🏪 Shop එකට යන්න</button>
        </div>
      )}

      <div className="card" style={{display:'flex', gap:8}}>
        <button className={"btn btn-sm "+(subTab==='vitals'?'btn-primary':'btn-ghost')} onClick={()=>setSubTab('vitals')}>📈 Vitals</button>
        <button className={"btn btn-sm "+(subTab==='upload'?'btn-primary':'btn-ghost')} onClick={()=>setSubTab('upload')}>📷 Upload Report</button>
        <button className={"btn btn-sm "+(subTab==='history'?'btn-primary':'btn-ghost')} onClick={()=>setSubTab('history')}>🗂 History</button>
      </div>

      {subTab==='vitals' && (
        <div>
          <div className="card">
            <h3>📝 Add Today's Reading</h3>
            <div className="grid c2">
              <div><label>Date</label><input type="date" value={vDate} onChange={e=>setVDate(e.target.value)} /></div>
              <div><label>FBS (mg/dL)</label><input type="number" value={fbs} onChange={e=>setFbs(e.target.value)} placeholder="e.g. 95" /></div>
              <div><label>BP Systolic</label><input type="number" value={systolic} onChange={e=>setSystolic(e.target.value)} placeholder="e.g. 120" /></div>
              <div><label>BP Diastolic</label><input type="number" value={diastolic} onChange={e=>setDiastolic(e.target.value)} placeholder="e.g. 80" /></div>
              <div><label>Pulse Rate</label><input type="number" value={pulse} onChange={e=>setPulse(e.target.value)} placeholder="e.g. 72" /></div>
            </div>
            <button className="btn btn-primary" style={{marginTop:14}} disabled={saving} onClick={saveVitals}>{saving?'Saving…':'+ Save Reading'}</button>
          </div>

          <div className="card">
            <h3>📊 Trends</h3>
            {vitals.length===0 ? <div className="empty">තවම vitals නැහැ — උඩ form එකෙන් reading එකක් add කරන්න</div> : (
              <React.Fragment>
                <VitalsChart vitals={vitals} field="fbs" label="FBS (mg/dL) — Normal: 70-100" color="#3EE6D0" />
                <VitalsChart vitals={vitals} field="systolic" label="BP Systolic — Normal: <130" color="#6BC3FF" />
                <VitalsChart vitals={vitals} field="pulse" label="Pulse Rate" color="#F5C563" />
              </React.Fragment>
            )}
          </div>
        </div>
      )}

      {subTab==='upload' && (
        <div className="card">
          <h3>📷 Upload Lab Report</h3>
          <p style={{fontSize:12, color:'var(--ink-soft)', marginTop:-6, marginBottom:12}}>
            FBC, FBS, ECG වගේ report එකක photo(s) හෝ PDF එකක් upload කරන්න — AI එකෙන් සරල සිංහලෙන් explain කරනවා.
            <br/>Report එක දිග (ECG strip වගේ) නම්, කොටස් වශයෙන් photo කීපයක් එකට add කරන්න — ඔක්කොම එකට combine කරලා analyze කරනවා.
          </p>
          <input ref={fileInputRef} type="file" accept="image/*" capture="environment" multiple style={{display:'none'}} onChange={addImages} />
          <input ref={pdfInputRef} type="file" accept="application/pdf" style={{display:'none'}} onChange={addPdf} />
          <div style={{display:'flex', gap:8}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>fileInputRef.current.click()}>📷 Add photo(s)</button>
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>pdfInputRef.current.click()}>📄 Add PDF</button>
          </div>

          {reportFiles.length>0 && (
            <div style={{marginTop:12}}>
              <p style={{fontSize:12, fontWeight:600, marginBottom:6}}>{reportFiles.length} file(s) — එකම report එකක කොටස් විදිහට analyze වෙනවා</p>
              <div style={{display:'flex', flexWrap:'wrap', gap:8}}>
                {reportFiles.map((rf,i)=>(
                  <div key={i} style={{position:'relative'}}>
                    {rf.isPdf ?
                      <div style={{width:70, height:70, borderRadius:8, background:'var(--teal-100)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:24}}>📄</div>
                      : <img src={rf.preview} style={{width:70, height:70, objectFit:'cover', borderRadius:8}} />}
                    <button onClick={()=>removeReportFile(i)} style={{position:'absolute', top:-6, right:-6, background:'var(--red)', color:'#fff', border:'none', borderRadius:'50%', width:20, height:20, fontSize:11, lineHeight:'20px'}}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          <button className="btn btn-primary" style={{width:'100%', marginTop:14}} disabled={analyzing} onClick={analyzeReport}>
            {analyzing? '🔍 AI Analyzing…' : '✨ Analyze with AI'}
          </button>
          {!geminiReady && <p style={{fontSize:11, color:'var(--red)', marginTop:8}}>⚠ AI key setup වෙලා නැහැ (staff/developer setup කරන්න ඕන).</p>}
        </div>
      )}

      {subTab==='history' && (
        <div>
          {reports.length>=2 && (
            <div className="card" style={{border:'1.5px solid var(--teal-500)'}}>
              <h3>🔬 Combined Analysis</h3>
              <p style={{fontSize:12, color:'var(--ink-soft)', marginTop:-6, marginBottom:10}}>
                Reports කීපයක් (වෙනස් දිනවල) තෝරලා, ඒවා එකට බලලා trend එකක් / පොදු නිගමනයක් ගන්න.
              </p>
              <button className="btn btn-primary btn-sm" disabled={combining} onClick={combineSelected}>
                {combining? 'Analyzing…' : '🔬 තෝරාගත් reports Combine කරන්න (' + Object.values(selectedForCombine).filter(Boolean).length + ')'}
              </button>
              {combinedResult && (
                <div style={{marginTop:14, padding:12, background:'var(--teal-100)', borderRadius:10}}>
                  <b style={{fontSize:13}}>📈 Trend</b><p style={{fontSize:12.5, margin:'4px 0 10px'}}>{combinedResult.trend}</p>
                  <b style={{fontSize:13}}>🔬 Combined Conclusion</b><p style={{fontSize:12.5, margin:'4px 0 10px'}}>{combinedResult.combinedConclusion}</p>
                  {(combinedResult.attentionPoints||[]).length>0 && (
                    <React.Fragment>
                      <b style={{fontSize:13}}>⚠ Attention Points</b>
                      {combinedResult.attentionPoints.map((a,i)=><p key={i} style={{fontSize:12.5, margin:'4px 0'}}>• {a}</p>)}
                    </React.Fragment>
                  )}
                  <p style={{fontSize:10.5, color:'var(--ink-soft)', marginTop:10, fontStyle:'italic'}}>
                    ⚠️ වැදගත්: මෙම තොරතුරු AI තාක්ෂණය මඟින් සැකසූ සරල අවබෝධයක් පමණි. කරුණාකර නිල නිගමන සඳහා ඔබේ පවුලේ වෛද්‍යවරයා හමුවන්න.
                  </p>
                </div>
              )}
            </div>
          )}

          {reports.length===0? <div className="empty">තවම analyzed reports නැහැ</div> :
          reports.map(r=>(
            <div className="card" key={r.id}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <label style={{display:'flex', alignItems:'center', gap:8, fontWeight:400}}>
                  <input type="checkbox" style={{width:'auto'}} checked={!!selectedForCombine[r.id]} onChange={()=>toggleCombine(r.id)} />
                  <b>{r.createdAtMs? new Date(r.createdAtMs).toLocaleDateString():''}</b>
                </label>
                {r.hasAbnormal && <span className="tag out">⚠ Abnormal</span>}
              </div>
              {(r.imagesData||[]).length>0 && (
                <div style={{display:'flex', gap:6, margin:'8px 0', flexWrap:'wrap'}}>
                  {r.imagesData.map((img,i)=><img key={i} src={img} style={{maxWidth:100, borderRadius:8}} />)}
                </div>
              )}
              <p style={{fontSize:13, margin:'8px 0'}}>{r.summary}</p>
              {(r.tests||[]).map((t,i)=>(
                <div key={i} style={{display:'flex', justifyContent:'space-between', fontSize:12.5, padding:'6px 0', borderTop:'1px solid var(--line)'}}>
                  <span>{t.name}: <b style={{color: t.status==='high'?'#FF9494':t.status==='low'?'#F5C563':'#7EE8A8'}}>{t.value} {t.unit}</b></span>
                  <span style={{color:'var(--ink-soft)'}}>{t.range}</span>
                </div>
              ))}
              <p style={{fontSize:10.5, color:'var(--ink-soft)', marginTop:10, fontStyle:'italic'}}>
                ⚠️ වැදගත්: මෙම තොරතුරු AI තාක්ෂණය මඟින් සැකසූ සරල අවබෝධයක් පමණි. කරුණාකර නිල නිගමන සඳහා ඔබේ පවුලේ වෛද්‍යවරයා හමුවන්න.
              </p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
