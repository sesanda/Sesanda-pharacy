<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<style>
  :root{
    --teal-900:#0A2149; --teal-700:#123C82; --teal-500:#2E6FE0; --teal-100:#132A4D; --accent:#6BC3FF; --accent-2:#3EE6D0;
    --amber:#E2A63A; --amber-dark:#B9821F;
    --red:#D64545; --green:#2F9E58;
    --ink:#EAF1FF; --ink-soft:#93A6CC; --line:#233254; --bg:#060912; --card:#0F1B33;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; color-scheme: dark;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background: linear-gradient(165deg, #000000 0%, #08132C 20%, #123B7A 48%, #0F5C4E 74%, #06231C 100%);
    background-attachment: fixed;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.brand{font-family:'Poppins',system-ui,sans-serif;}
  button{font-family:inherit; cursor:pointer;}
  input,select{font-family:inherit;}
  /* Stop Chrome's autofill from forcing a white background on name/search fields */
  input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus{
    -webkit-text-fill-color: var(--ink) !important;
    -webkit-box-shadow: 0 0 0px 1000px var(--card) inset !important;
    box-shadow: 0 0 0px 1000px var(--card) inset !important;
    caret-color: var(--ink);
    transition: background-color 9999s ease-in-out 0s;
  }

  /* ---- Gate / Portal picker ---- */
  .gate{min-height:100vh; display:flex; align-items:center; justify-content:center; background:
    radial-gradient(1200px 600px at 20% -10%, #17417F 0%, #0A2149 45%, #061229 100%);
    padding:24px;}
  .gate-card{background:var(--card); border-radius:20px; padding:40px 32px; width:100%; max-width:420px; box-shadow:0 30px 60px rgba(0,0,0,.35); text-align:center;}
  .gate-mark{width:64px;height:64px;border-radius:16px;background:#fff; margin:0 auto 18px; display:flex;align-items:center;justify-content:center;overflow:hidden; box-shadow:0 4px 14px rgba(0,0,0,.25);}
  .gate-mark img{width:100%;height:100%;object-fit:cover;}
  .gate h1{font-size:22px; margin:0 0 4px; color:var(--accent);}
  .gate p{color:var(--ink-soft); font-size:13.5px; margin:0 0 26px;}
  .portal-btn{display:flex; align-items:center; gap:14px; width:100%; padding:16px 18px; border-radius:14px; border:1.5px solid var(--line); background:var(--card); margin-bottom:12px; text-align:left; transition:.15s;}
  .portal-btn:hover{border-color:var(--teal-500); background:var(--teal-100); transform:translateY(-1px);}
  .portal-btn .ic{font-size:22px;}
  .portal-btn b{display:block; font-size:15px; color:var(--ink);}
  .portal-btn span{font-size:12.5px; color:var(--ink-soft);}
  .conn-pill{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; color:var(--ink-soft); margin-top:18px;}
  .dot{width:7px;height:7px;border-radius:50%; background:var(--green);}
  .dot.off{background:var(--red);}

  /* ---- Layout shell ---- */
  .app{min-height:100vh; display:flex;}
  .side{width:230px; background:var(--teal-900); color:#fff; display:flex; flex-direction:column; padding:20px 14px; flex-shrink:0;}
  .side .brand{font-size:16px; padding:0 8px 18px; border-bottom:1px solid rgba(255,255,255,.12); margin-bottom:14px;}
  .side .brand small{display:block; font-size:11px; font-weight:400; opacity:.65; margin-top:2px;}
  .side-backdrop{display:none;}
  .hamburger{display:none; background:none; border:none; padding:6px; margin-right:10px; border-radius:8px;}
  .hamburger span{display:block; width:22px; height:2.5px; background:var(--ink); margin:4.5px 0; border-radius:2px;}
  @media(max-width:860px){
    .side{position:fixed; top:0; left:0; bottom:0; z-index:60; transform:translateX(-100%); transition:transform .22s ease; box-shadow:8px 0 24px rgba(0,0,0,.25);}
    .side.open{transform:translateX(0);}
    .side-backdrop{display:block; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:55;}
    .hamburger{display:inline-flex; flex-direction:column; justify-content:center;}
  }
  .nav-btn{display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:transparent; border:none; color:rgba(255,255,255,.78); padding:11px 12px; border-radius:10px; font-size:13.5px; margin-bottom:3px;}
  .nav-btn.active{background:rgba(255,255,255,.14); color:#fff; font-weight:600;}
  .nav-btn:hover{background:rgba(255,255,255,.08);}
  .side-foot{margin-top:auto; padding-top:14px; border-top:1px solid rgba(255,255,255,.12); font-size:12px; opacity:.7;}
  .side-foot button{background:none;border:none;color:#fff;opacity:.85;font-size:12.5px;padding:8px 0;}

  .main{flex:1; min-width:0; display:flex; flex-direction:column;}
  .topbar{background:var(--card); border-bottom:1px solid var(--line); padding:14px 26px; display:flex; align-items:center; justify-content:space-between;}
  .topbar h2{margin:0; font-size:17px;}
  .content{padding:22px 26px; overflow-y:auto;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; margin-bottom:18px;}
  .card h3{margin:0 0 14px; font-size:14.5px; color:var(--accent); display:flex; align-items:center; gap:8px;}
  .grid{display:grid; gap:12px;}
  .grid.c2{grid-template-columns:1fr 1fr;}
  .grid.c3{grid-template-columns:1fr 1fr 1fr;}
  .grid.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
  @media(max-width:720px){.grid.c2,.grid.c3,.grid.c4{grid-template-columns:1fr;}}

  label{display:block; font-size:12px; color:var(--ink-soft); margin-bottom:5px; font-weight:500;}
  input,select,textarea{
    width:100%; padding:9px 11px; border:1.5px solid var(--line); border-radius:9px; font-size:13.5px; background:var(--card); color:var(--ink);
  }
  input:read-only, input:disabled{ color:var(--ink); opacity:1; -webkit-text-fill-color:var(--ink); }
  input:focus,select:focus{outline:none; border-color:var(--teal-500); box-shadow:0 0 0 3px var(--teal-100);}
  .btn{padding:10px 18px; border-radius:10px; border:none; font-size:13.5px; font-weight:600;}
  .btn-primary{background:var(--teal-700); color:#fff;}
  .btn-primary:hover{background:var(--teal-900);}
  .btn-ghost{background:var(--card); border:1.5px solid var(--line); color:var(--ink);}
  .btn-amber{background:var(--amber); color:#3A2A00;}
  .btn-sm{padding:6px 12px; font-size:12px; border-radius:8px;}
  .btn-danger{background:#FBE9E9; color:var(--red); border:1px solid #F3C6C6;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-soft); padding:9px 10px; border-bottom:1.5px solid var(--line);}
  td{padding:9px 10px; border-bottom:1px solid var(--line);}
  tr:hover td{background:#FAFDFC;}
  .tag{display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600;}
  .tag.ok{background:rgba(47,158,88,.22); color:#7EE8A8;}
  .tag.low{background:rgba(226,166,58,.22); color:#F5C563;}
  .tag.out{background:rgba(214,69,69,.22); color:#FF9494;}
  .tag.pending{background:rgba(226,166,58,.22); color:#F5C563;}
  .tag.done{background:rgba(47,158,88,.22); color:#7EE8A8;}

  .autocomplete{position:relative;}
  .ac-list{position:absolute; top:100%; left:0; right:0; background:var(--card); border:1.5px solid var(--teal-500); border-top:none; border-radius:0 0 10px 10px; max-height:220px; overflow-y:auto; z-index:30; box-shadow:0 12px 24px rgba(0,0,0,.12);}
  .ac-item{padding:9px 12px; font-size:13px; cursor:pointer; border-bottom:1px solid var(--line);}
  .ac-item.hi{background:var(--teal-100);}

  .empty{text-align:center; padding:40px 20px; color:var(--ink-soft); font-size:13.5px;}
  .toast{position:fixed; bottom:20px; right:20px; background:var(--teal-900); color:#fff; padding:14px 18px; border-radius:12px; font-size:13.5px; box-shadow:0 12px 28px rgba(0,0,0,.25); z-index:100; max-width:320px;}

  /* ---- Customer portal ---- */
  .cust-shell{max-width:520px; margin:0 auto; min-height:100vh; background:transparent; display:flex; flex-direction:column;}
  .cust-top{background:var(--teal-900); color:#fff; padding:16px 18px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20;}
  .cust-body{flex:1; padding:14px 16px 90px;}
  .prod-card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .prod-info b{font-size:14px; display:block;}
  .prod-info .generic{font-size:11.5px; color:var(--ink-soft);}
  .prod-info .price{font-size:14px; font-weight:700; color:var(--accent-2); margin-top:4px;}
  .qty-ctl{display:flex; align-items:center; gap:8px;}
  .qty-ctl button{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);font-size:16px;}
  .cust-tabs{position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--line); display:flex; max-width:520px; margin:0 auto;}
  .cust-tabs button{flex:1; padding:12px 4px; background:none; border:none; font-size:11.5px; color:var(--ink-soft); display:flex; flex-direction:column; align-items:center; gap:3px;}
  .cust-tabs button.active{color:var(--accent-2); font-weight:700;}
  .cust-tabs .ic{font-size:19px;}
  .badge{position:absolute; top:-4px; right:-6px; background:var(--red); color:#fff; font-size:10px; border-radius:20px; padding:1px 6px; font-weight:700;}
  .fab-wrap{position:relative; display:inline-block;}
</style>
</head>

/* ---------------- Firestore hooks (real-time) ---------------- */
function useCollection(name, orderField){
  const [data,setData] = useState([]);
  const [loading,setLoading] = useState(true);
  useEffect(()=>{
    if(!db) return;
    let q = db.collection(name);
    const unsub = q.onSnapshot(snap=>{
      let rows = snap.docs.map(d=>({id:d.id,...d.data()}));
      if(orderField) rows.sort((a,b)=> (a[orderField]>b[orderField]?1:-1));
      setData(rows); setLoading(false);
    }, err=>{ console.error(name, err); setLoading(false); });
    return unsub;
  },[name]);
  return [data, loading];
}

// deduct stock across batches, earliest-expiry-first (FEFO)
async function deductStockFEFO(itemId, qtyToDeduct, batches){
  let remaining = qtyToDeduct;
  const relevant = batches.filter(b=>b.itemId===itemId && b.remainingUnits>0)
    .sort((a,b)=> (a.expiryDate||'')<(b.expiryDate||'')?-1:1);
  for(const b of relevant){
    if(remaining<=0) break;
    const take = Math.min(b.remainingUnits, remaining);
    await db.collection('batches').doc(b.id).update({remainingUnits: b.remainingUnits - take});
    remaining -= take;
  }
  return remaining; // >0 means stock ran short
}

// Compress an image file down to a small base64 JPEG (fits comfortably in a Firestore doc, no Storage/Blaze needed)
function imageFileToCompressedBase64(file, maxDim=700, quality=0.55){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = ()=>{ img.onload = ()=>{
      let w = img.width, h = img.height;
      if(w>h && w>maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
      else if(h>=w && h>maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    }; img.onerror = reject; img.src = reader.result; };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function blobToBase64(blob){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}
function daysFromToday(dateStr){
  const d = new Date(dateStr); const now = new Date();
  d.setHours(0,0,0,0); now.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}

/* ---------- Shared camera-scan / OCR item-matching helpers (used in Shop, GRN, and Bill entry) ---------- */
const OCR_FILLER_WORDS = new Set(['mg','mcg','ml','gm','g','tab','tabs','tablet','tablets','cap','caps','capsule',
  'capsules','ip','bp','usp','syrup','susp','cream','oint','ointment','drops','inj','injection','strip','pack','box','of','the']);
function ocrNormalize(s){ return (s||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim(); }
function ocrCoreTokens(s){ return ocrNormalize(s).split(' ').filter(w=> w && !OCR_FILLER_WORDS.has(w)); }
// Lenient match: ignores unit/dosage-form words so "Atorva 10" (box) still matches
// a registered item named "Atorva 10 mg" — only the medicine name + strength number need to line up.
function matchItemFromOcrText(rawText, items){
  const ocrTokens = new Set(ocrCoreTokens(rawText));
  if(ocrTokens.size===0) return null;
  let bestItem=null, bestFrac=0;
  for(const it of items){
    const tokens = ocrCoreTokens(it.brandName);
    if(tokens.length===0) continue;
    const hits = tokens.filter(t=>ocrTokens.has(t)).length;
    const frac = hits/tokens.length;
    if(frac>bestFrac){ bestFrac=frac; bestItem=it; }
  }
  return bestFrac>=0.75 ? bestItem : null;
}
function guessLineFromOcrText(rawText){
  const lines = (rawText||'').split('\n').map(l=>l.trim()).filter(l=> l.replace(/[^a-zA-Z]/g,'').length>=3);
  lines.sort((a,b)=> b.replace(/[^a-zA-Z]/g,'').length - a.replace(/[^a-zA-Z]/g,'').length);
  return lines[0] || '';
}
// Grayscale + contrast boost — noticeably improves OCR accuracy on printed box/label photos
function ocrPreprocessCanvas(canvas){
  const ctx = canvas.getContext('2d');
  const {width:w, height:h} = canvas;
  const imgData = ctx.getImageData(0,0,w,h);
  const d = imgData.data;
  for(let i=0;i<d.length;i+=4){
    const gray = 0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
    let v = (gray-128)*1.5+128;
    v = Math.max(0, Math.min(255, v));
    d[i]=d[i+1]=d[i+2]=v;
  }
  ctx.putImageData(imgData,0,0);
}
function ocrCaptureVideoFrame(video){
  if(!video || !video.videoWidth) return null;
  const targetW = 700;
  const scale = targetW/video.videoWidth;
  const canvas = document.createElement('canvas');
  canvas.width = targetW; canvas.height = Math.round(video.videoHeight*scale);
  canvas.getContext('2d').drawImage(video, 0,0, canvas.width, canvas.height);
  ocrPreprocessCanvas(canvas);
  return canvas;
}
function ocrFileToPreprocessedCanvas(file){
  return new Promise((resolve,reject)=>{
    const img = new Image(); const reader = new FileReader();
    reader.onload = ()=>{ img.onload=()=>{
      const targetW = 700; const scale = targetW/img.width;
      const canvas = document.createElement('canvas');
      canvas.width = targetW; canvas.height = Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      ocrPreprocessCanvas(canvas); resolve(canvas);
    }; img.onerror=reject; img.src=reader.result; };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}

/* Reusable camera-scan button + live-scan overlay. Drop it next to any "item search" field.
   onMatch(item) fires on a confident match; onGuess(text) fires when no confident match was found. */
function ItemScanButton({items, onMatch, onGuess, notify, showGallery}){
  const [cameraOpen,setCameraOpen] = useState(false);
  const [scanStatus,setScanStatus] = useState('');
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const stopLoopRef = useRef(false);
  const galleryInputRef = useRef(null);
  const cameraFallbackInputRef = useRef(null);

  const closeCamera = ()=>{
    stopLoopRef.current = true;
    if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
    setCameraOpen(false); setScanStatus('');
  };

  const runAutoScanLoop = async ()=>{
    if(typeof Tesseract==='undefined'){ notify && notify('Scan library load වුනේ නැහැ — internet check කරලා try කරන්න'); closeCamera(); return; }
    let attempts = 0;
    while(!stopLoopRef.current && attempts<25){
      attempts++;
      setScanStatus('🔍 Scanning... (' + attempts + ')');
      const canvas = ocrCaptureVideoFrame(videoRef.current);
      if(canvas){
        try{
          const {data} = await Tesseract.recognize(canvas, 'eng');
          if(stopLoopRef.current) return;
          const matched = matchItemFromOcrText(data.text||'', items);
          if(matched){
            notify && notify('✓ Matched: ' + matched.brandName);
            closeCamera();
            onMatch(matched);
            return;
          }
        } catch(err){ console.error('OCR failed', err); }
      }
      await new Promise(r=>setTimeout(r, 350));
    }
    if(!stopLoopRef.current){
      notify && notify('Match හම්බුනේ නැහැ — item එක camera එකට ලංකරලා නැවත try කරන්න, හෝ manual search කරන්න');
      closeCamera();
    }
  };

  const openCamera = async ()=>{
    const isSecure = window.isSecureContext;
    if(!isSecure || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      notify && notify('Live camera scan එකට HTTPS ඕන — දැනට camera app එකෙන් photo එකක් ගන්නවා');
      cameraFallbackInputRef.current && cameraFallbackInputRef.current.click();
      return;
    }
    try{
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment', width:{ideal:1280}, height:{ideal:720}}});
      streamRef.current = stream;
      stopLoopRef.current = false;
      setCameraOpen(true);
      setTimeout(()=>{ if(videoRef.current){ videoRef.current.srcObject = stream; videoRef.current.play(); } }, 0);
      setTimeout(runAutoScanLoop, 500);
    } catch(err){
      notify && notify('Live camera access ලැබුනේ නැහැ — camera app එකෙන් photo එකක් ගන්නවා');
      cameraFallbackInputRef.current && cameraFallbackInputRef.current.click();
    }
  };

  const handleFile = async (e)=>{
    const file = e.target.files[0]; e.target.value = '';
    if(!file) return;
    if(typeof Tesseract==='undefined'){ notify && notify('Scan library load වුනේ නැහැ — internet check කරලා try කරන්න'); return; }
    setScanStatus('scanning');
    try{
      const canvas = await ocrFileToPreprocessedCanvas(file);
      const {data} = await Tesseract.recognize(canvas, 'eng');
      const matched = matchItemFromOcrText(data.text||'', items);
      if(matched){ notify && notify('✓ Matched: ' + matched.brandName); onMatch(matched); }
      else {
        const guess = guessLineFromOcrText(data.text||'');
        notify && notify(guess ? ('හරියටම match වුනේ නැහැ — "'+guess+'" කියලා සොයනවා, අවශ්‍ය නම් edit කරන්න') : 'Text කියවගන්න බැරි වුනා — manual search කරන්න');
        onGuess && onGuess(guess);
      }
    } catch(err){ console.error('OCR failed', err); notify && notify('Scan එකේ දෝෂයක් — නැවත try කරන්න'); }
    setScanStatus('');
  };

  return (
    <React.Fragment>
      <button type="button" className="btn btn-ghost" style={{padding:'0 14px'}} onClick={openCamera} title="Scan medicine">
        {scanStatus==='scanning' ? '🔍' : '📷'}
      </button>
      <input ref={galleryInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile} />
      <input ref={cameraFallbackInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleFile} />
      {showGallery && (
        <button type="button" className="btn btn-ghost btn-sm" style={{marginTop:8}} onClick={()=>galleryInputRef.current.click()}>
          🖼️ Gallery එකෙන් photo එකක් scan කරන්න
        </button>
      )}
      {cameraOpen && (
        <div style={{position:'fixed', inset:0, background:'rgba(6,10,25,.9)', zIndex:500,
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{width:'100%', maxWidth:420, position:'relative', borderRadius:12, overflow:'hidden', background:'#000'}}>
            <video ref={videoRef} playsInline muted style={{width:'100%', display:'block'}}></video>
            <div style={{position:'absolute', inset:0, margin:24, border:'3px solid rgba(255,255,255,.6)', borderRadius:12, pointerEvents:'none'}}></div>
          </div>
          <p style={{textAlign:'center', fontSize:13.5, marginTop:14, color:'#fff', fontWeight:600}}>
            {scanStatus && scanStatus!=='scanning' ? scanStatus : '📷 බෙහෙත් නම viewfinder එක ඇතුළේ තියාගෙන ඉන්න...'}
          </p>
          <button className="btn btn-danger" style={{marginTop:10, width:'100%', maxWidth:420}} onClick={closeCamera}>✕ Cancel</button>
        </div>
      )}
    </React.Fragment>
  );
}

            ඒක කරන තුරු data save/load වෙන්නෙ නෑ.
          </p>
        </div>
      </div>
    );
  }

  if(portal === 'staff') return <StaffApp onExit={()=>setPortal(null)} />;
  if(portal === 'customer') return <CustomerApp onExit={()=>setPortal(null)} />;

  return (
    <div className="gate">
      <div className="gate-card">
        <div className="gate-mark"><img src={window.APP_LOGO} alt="Sesanda Pharmacy" /></div>
        <h1>Sesanda Pharmacy</h1>
        <p>Real-time POS — computer සහ phone දෙකෙන්ම එකවර update වෙනවා</p>

        <button className="portal-btn" onClick={()=>setPortal('staff')}>
          <span className="ic">🧑‍⚕️</span>
          <span><b>Staff / Admin Portal</b><span>Item registration, GRN, orders, reports</span></span>
        </button>
        <button className="portal-btn" onClick={()=>setPortal('customer')}>
          <span className="ic">🛍️</span>
          <span><b>Customer Portal</b><span>Browse medicines, place orders</span></span>
        </button>

        <div className="conn-pill"><span className="dot"></span> Connected to live database</div>
      </div>
    </div>
  );
}

function StaffApp({onExit}){
  const [user,setUser] = useState(null);
  const [authChecked,setAuthChecked] = useState(false);
  const [tab,setTab] = useState('dashboard');
  const [toast,setToast] = useState(null);
  const [sideOpen,setSideOpen] = useState(false);
  const [billPrefill,setBillPrefill] = useState(null);
  const notify = (msg)=>{ setToast(msg); setTimeout(()=>setToast(null), 3200); };

  useEffect(()=>{
    const unsub = firebase.auth().onAuthStateChanged(fbUser=>{
      if(fbUser){
        const displayName = fbUser.email ? fbUser.email.split('@')[0].replace(/[._]/g,' ') : 'Staff';
        setUser({ name: displayName.charAt(0).toUpperCase()+displayName.slice(1), email: fbUser.email, uid: fbUser.uid });
      } else {
        setUser(null);
      }
      setAuthChecked(true);
    });
    return unsub;
  },[]);

  const [items] = useCollection('items');
  const [batches] = useCollection('batches');
  const [suppliers] = useCollection('suppliers');
  const [customers] = useCollection('customers');
  const [orders] = useCollection('orders');
  const [grns] = useCollection('grns');
  const [specialOrders] = useCollection('specialOrders');
  const [invoices] = useCollection('invoices');
  const [journal] = useCollection('journal');
  const [expenses] = useCollection('expenses');
  const [adjustments] = useCollection('adjustments');

  const newOrders = orders.filter(o=>o.status==='ordered');
  const prevPendingCount = useRef(0);
  useEffect(()=>{
    if(newOrders.length > prevPendingCount.current && prevPendingCount.current !== 0){
      beep(); notify(newOrders.length + " new order(s) — අලුත් order එකක් ආවා!");
    }
    prevPendingCount.current = newOrders.length;
  },[newOrders.length]);

  const pendingSpecial = specialOrders.filter(s=>s.status==='pending_approval');
  const prevSpecialCount = useRef(0);
  useEffect(()=>{
    if(pendingSpecial.length > prevSpecialCount.current && prevSpecialCount.current !== 0){
      beep(); notify(pendingSpecial.length + " prescription/voice request(s) — review කරන්න!");
    }
    prevSpecialCount.current = pendingSpecial.length;
  },[pendingSpecial.length]);

  if(!authChecked){
    return <div className="gate"><div className="gate-card"><div className="gate-mark"><img src={window.APP_LOGO} alt="Sesanda Pharmacy" /></div><p>Loading…</p></div></div>;
  }
  if(!user){
    return <StaffLogin onExit={onExit} />;
  }

  const NAV = [
    {id:'dashboard', label:'Dashboard', ic:'📊'},
    {id:'billing', label:'New Bill', ic:'🧾'},
    {id:'items', label:'Item Registration', ic:'💊'},
    {id:'grn', label:'GRN Entry', ic:'📦'},
    {id:'opening', label:'Opening Stock', ic:'📥'},
    {id:'stock', label:'Stock', ic:'📋'},
    {id:'suppliers', label:'Suppliers', ic:'🚚'},
    {id:'customers', label:'Customers', ic:'👥'},
    {id:'orders', label:'Orders', ic:'🔔', badge:newOrders.length},
    {id:'special', label:'Prescriptions/Voice', ic:'🩺', badge:pendingSpecial.length},
    {id:'reports', label:'Reports', ic:'📈'},
  ];

  return (
    <div className="app">
      {sideOpen && <div className="side-backdrop" onClick={()=>setSideOpen(false)}></div>}
      <div className={"side"+(sideOpen?" open":"")}>
        <div className="brand">Sesanda Pharmacy<small>Staff Portal — {user.name}</small></div>
        {NAV.map(n=>(
          <button key={n.id} className={"nav-btn"+(tab===n.id?" active":"")} onClick={()=>{setTab(n.id); setSideOpen(false);}}>
            <span>{n.ic}</span><span style={{flex:1}}>{n.label}</span>
            {!!n.badge && <span className="tag pending">{n.badge}</span>}
          </button>
        ))}
        <div className="side-foot">
          <button onClick={()=>firebase.auth().signOut()}>↩ Sign out</button><br/>
          <button onClick={onExit}>🏠 Home</button>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div style={{display:'flex', alignItems:'center'}}>
            <button className="hamburger" onClick={()=>setSideOpen(o=>!o)}><span></span><span></span><span></span></button>
            <h2>{NAV.find(n=>n.id===tab)?.label}</h2>
          </div>
          <span className="conn-pill"><span className="dot"></span>Live</span>
        </div>
        <div className="content">
          {tab==='dashboard' && <Dashboard items={items} batches={batches} orders={orders} suppliers={suppliers} customers={customers} grns={grns}/>}
          {tab==='billing' && <NewBill items={items} batches={batches} customers={customers} notify={notify} staffUser={user} prefill={billPrefill} clearPrefill={()=>setBillPrefill(null)}/>}
          {tab==='items' && <ItemRegistration items={items} batches={batches} notify={notify}/>}
          {tab==='grn' && <GRNEntry items={items} batches={batches} suppliers={suppliers} notify={notify}/>}
          {tab==='opening' && <OpeningStock items={items} batches={batches} notify={notify}/>}
          {tab==='stock' && <StockView items={items} batches={batches}/>}
          {tab==='suppliers' && <Suppliers suppliers={suppliers} notify={notify}/>}
          {tab==='customers' && <Customers customers={customers} notify={notify}/>}
          {tab==='orders' && <OrdersBoard orders={orders} items={items} batches={batches} notify={notify}/>}
          {tab==='special' && <StaffSpecialOrders specialOrders={specialOrders} notify={notify}
            onConvertToInvoice={(s)=>{ setBillPrefill({customerName:s.customerName, customerTel:s.customerTel, sourceSpecialOrderId:s.id}); setTab('billing'); }} />}
          {tab==='reports' && <Reports invoices={invoices} journal={journal} batches={batches} items={items} grns={grns}
            suppliers={suppliers} expenses={expenses} adjustments={adjustments} notify={notify}/>}
        </div>
      </div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function StaffLogin({onExit}){
  const [email,setEmail] = useState('');
  const [password,setPassword] = useState('');
  const [err,setErr] = useState('');
  const [loading,setLoading] = useState(false);
  const submit = async ()=>{
    if(!email || !password) return setErr('Email සහ Password දෙන්න');
    setErr(''); setLoading(true);
    try{
      await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
    } catch(e){
      setErr('Login වැරදියි — email/password check කරන්න');
    }
    setLoading(false);
  };
  return (
    <div className="gate">
      <div className="gate-card">
        <div className="gate-mark"><img src={window.APP_LOGO} alt="Sesanda Pharmacy" /></div>
        <h1>Staff Login</h1>
        <p>Email සහ Password එකෙන් login වෙන්න</p>
        <div style={{textAlign:'left', marginBottom:12}}>
          <label>Email</label>
          <input type="text" value={email} onChange={e=>setEmail(e.target.value)}
            onKeyDown={e=>e.key==='Enter' && submit()} placeholder="staff@sesanda.pharmacy" autoComplete="username" />
        </div>
        <div style={{textAlign:'left', marginBottom:16}}>
          <label>Password</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
            onKeyDown={e=>e.key==='Enter' && submit()} placeholder="••••••••" autoComplete="current-password" />
        </div>
        {err && <p style={{color:'var(--red)', fontSize:12.5, marginTop:-8, marginBottom:12}}>{err}</p>}
        <button className="btn btn-primary" style={{width:'100%'}} disabled={loading} onClick={submit}>{loading?'Signing in…':'Login'}</button>
        <button className="btn btn-ghost" style={{width:'100%', marginTop:10}} onClick={onExit}>← Back</button>
      </div>
    </div>
  );
}

function Dashboard({items,batches,orders,suppliers,customers,grns}){
  const totalUnits = batches.reduce((s,b)=>s+(b.remainingUnits||0),0);
  const stockValue = batches.reduce((s,b)=>s+((b.remainingUnits||0)*(b.unitCost||0)),0);
  const lowStock = items.filter(it=>{
    const rem = batches.filter(b=>b.itemId===it.id).reduce((s,b)=>s+(b.remainingUnits||0),0);
    return rem>0 && rem<=20;
  }).length;
  const pending = orders.filter(o=>o.status==='ordered').length;
  const totalDue = customers.reduce((s,c)=>s+(c.dueAmount||0),0);
  const cards = [
    {label:'Items registered', val:items.length, ic:'💊'},
    {label:'Units in stock', val:totalUnits.toLocaleString(), ic:'📦'},
    {label:'Stock value (cost)', val:fmt(stockValue), ic:'💰'},
    {label:'Low stock items', val:lowStock, ic:'⚠️'},
    {label:'New orders', val:pending, ic:'🔔'},
    {label:'Customer dues', val:fmt(totalDue), ic:'🧾'},
  ];

  // Supplier credit period — alert from 3 days before the due date (per spec)
  const upcoming = (grns||[]).filter(g=>g.payment==='credit' && !g.paid).map(g=>{
    const sup = suppliers.find(s=>s.id===g.supplierId);
    const creditDays = sup ? Number(sup.credit)||0 : 0;
    const dueDate = new Date(g.date); dueDate.setDate(dueDate.getDate()+creditDays);
    const dueDateStr = dueDate.toISOString().slice(0,10);
    const daysLeft = daysFromToday(dueDateStr);
    return {...g, supplierName: g.supplierName||sup?.name, dueDateStr, daysLeft};
  }).filter(g=> g.daysLeft<=3).sort((a,b)=>a.daysLeft-b.daysLeft);

  const markPaid = async (id)=>{ await db.collection('grns').doc(id).update({paid:true}); };

  // Near-expiry — any batch expiring within 3 months (90 days), still in stock
  const nearExpiry = batches.filter(b=> b.remainingUnits>0 && b.expiryDate && daysFromToday(b.expiryDate)<=90)
    .map(b=>({...b, daysLeft: daysFromToday(b.expiryDate)}))
    .sort((a,b)=>a.daysLeft-b.daysLeft);

  // Re-order suggestions — items with a reorder level set, whose current stock has fallen below it
  const reorderList = items.filter(it=> (it.reorderLevel||0)>0).map(it=>{
    const itemBatches = batches.filter(b=>b.itemId===it.id);
    const rem = itemBatches.reduce((s,b)=>s+(b.remainingUnits||0),0);
    const lastBatch = itemBatches[itemBatches.length-1];
    const suggestedSupplier = lastBatch?.supplierName || '—';
    const suggestedQty = Math.max(it.reorderLevel*2 - rem, it.reorderLevel);
    return {...it, rem, suggestedSupplier, suggestedQty};
  }).filter(it=> it.rem < it.reorderLevel).sort((a,b)=>a.rem-b.rem);

  return (
    <div>
      <div className="grid c3">
        {cards.map(c=>(
          <div className="card" key={c.label}>
            <div style={{fontSize:22}}>{c.ic}</div>
            <div style={{fontSize:22, fontWeight:700, margin:'8px 0 2px'}}>{c.val}</div>
            <div style={{fontSize:12.5, color:'var(--ink-soft)'}}>{c.label}</div>
          </div>
        ))}
      </div>

      <div className="card">
        <h3>⏰ Upcoming Supplier Payments (credit period — දින 3කට කලින්)</h3>
        {upcoming.length===0 ? <div className="empty">දින 3ක් ඇතුළත ගෙවීම් නැහැ</div> :
        upcoming.map(g=>(
          <div key={g.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center',
            padding:'10px 4px', borderBottom:'1px solid var(--line)'}}>
            <div>
              <b>{g.supplierName}</b> — {g.grnNo}
              <div style={{fontSize:12, color: g.daysLeft<0 ? 'var(--red)':'var(--ink-soft)'}}>
                {g.daysLeft<0 ? `${Math.abs(g.daysLeft)} days overdue` : g.daysLeft===0 ? 'Due today' : `Due in ${g.daysLeft} days`} ({g.dueDateStr})
              </div>
            </div>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <b>{fmt(g.totalAmount)}</b>
              <button className="btn btn-primary btn-sm" onClick={()=>markPaid(g.id)}>✓ Mark Paid</button>
            </div>
          </div>
        ))}
      </div>

      <div className="card">
        <h3 style={{color:'var(--red)'}}>🩸 Near-Expiry Alerts (මාස 3ක් ඇතුළත)</h3>
        {nearExpiry.length===0 ? <div className="empty">මාස 3ක් ඇතුළත expire වෙන batches නැහැ</div> :
        nearExpiry.map(b=>(
          <div key={b.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center',
            padding:'10px 4px', borderBottom:'1px solid var(--line)'}}>
            <div>
              <b>{b.brandName}</b> <span style={{fontSize:12, color:'var(--ink-soft)'}}>({b.batchCode})</span>
              <div style={{fontSize:12, color:'var(--red)', fontWeight:600}}>
                {b.daysLeft<0? 'Expired' : `${b.daysLeft} days left`} — {b.expiryDate}
              </div>
            </div>
            <span className="tag out">{b.remainingUnits} left</span>
          </div>
        ))}
        <p style={{fontSize:11, color:'var(--ink-soft)', marginTop:8}}>
          විකුණුම් වලදී මේ batches මුලින්ම suggest වෙනවා (FEFO — කල් ඉකුත් වෙන්න ළඟම batch එකෙන් auto-deduct වෙන නිසා).
        </p>
      </div>

      <div className="card">
        <h3>📥 Re-Order Suggestions</h3>
        {reorderList.length===0 ? <div className="empty">Re-order level එකට වඩා අඩු items නැහැ</div> :
        reorderList.map(it=>(
          <div key={it.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center',
            padding:'10px 4px', borderBottom:'1px solid var(--line)'}}>
            <div>
              <b>{it.brandName}</b>
              <div style={{fontSize:12, color:'var(--ink-soft)'}}>
                Stock: {it.rem} / Re-order level: {it.reorderLevel} — Supplier: {it.suggestedSupplier}
              </div>
            </div>
            <span className="tag low">Order ~{it.suggestedQty} {it.unit}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- Item Registration ---------- */
function ItemRegistration({items, batches, notify}){
  const [editingId,setEditingId] = useState(null);
  const [brand,setBrand] = useState('');
  const [generic,setGeneric] = useState('');
  const [packSize,setPackSize] = useState('');
  const [unit,setUnit] = useState('tablets');
  const [reorderLevel,setReorderLevel] = useState('');
  const [saving,setSaving] = useState(false);
  const [scanning,setScanning] = useState(false);
  const scanInputRef = useRef(null);

  const genericOptions = [...new Set(items.map(it=>it.genericName).filter(Boolean))].sort();

  const resetForm = ()=>{
    setEditingId(null); setBrand(''); setGeneric(''); setPackSize(''); setUnit('tablets'); setReorderLevel('');
  };

  const startEdit = (it)=>{
    setEditingId(it.id); setBrand(it.brandName); setGeneric(it.genericName);
    setPackSize(String(it.packSize)); setUnit(it.unit); setReorderLevel(it.reorderLevel? String(it.reorderLevel):'');
    window.scrollTo({top:0, behavior:'smooth'});
  };

  const save = async ()=>{
    if(!brand || !generic || !packSize) return notify('සියලු fields පුරවන්න');
    const dup = items.find(it=> it.brandName.toLowerCase()===brand.toLowerCase() && it.id!==editingId);
    if(dup) return notify('මේ Brand Name එක දැනටමත් register වෙලා (Item ' + dup.itemNumber + ')');
    setSaving(true);
    if(editingId){
      await db.collection('items').doc(editingId).update({
        brandName:brand, genericName:generic, packSize:Number(packSize), unit, reorderLevel:Number(reorderLevel)||0,
      });
      notify('✓ Item එක update කළා');
    } else {
      const num = await nextItemNumber();
      const itemNumber = pad5(num);
      await db.collection('items').add({
        itemNumber, brandName:brand, genericName:generic,
        packSize:Number(packSize), unit, reorderLevel:Number(reorderLevel)||0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      notify('Item registered — code ' + itemNumber);
    }
    resetForm();
    setSaving(false);
  };

  const removeItem = async (it)=>{
    const itemBatches = (batches||[]).filter(b=>b.itemId===it.id);
    const stockLeft = itemBatches.reduce((s,b)=>s+(b.remainingUnits||0),0);
    const warning = stockLeft>0
      ? `⚠ "${it.brandName}" ට stock ${stockLeft} ${it.unit} ඉතුරු වෙලා තියෙනවා. Item එක remove කළත් ඒ batches/history වෙනස් වෙන්නේ නෑ, ඒත් නැවත GRN/Bill වලින් මේ item එක select කරන්න බැරි වෙනවා. Continue කරන්නද?`
      : `"${it.brandName}" (${it.itemNumber}) delete කරන්නද?`;
    if(!window.confirm(warning)) return;
    await db.collection('items').doc(it.id).delete();
    notify('🗑 Item එක ඉවත් කළා');
  };

  // Fast single-shot scan just for filling in the Brand Name — unlike the GRN/Bill
  // scanner this does ONE OCR pass (no repeated match-search loop), since a brand-new
  // item obviously has no existing match to search for. Much quicker.
  const quickScanBrand = async (e)=>{
    const file = e.target.files[0]; e.target.value = '';
    if(!file) return;
    if(typeof Tesseract==='undefined'){ notify('Scan library load වුනේ නැහැ — internet check කරන්න'); return; }
    setScanning(true);
    try{
      const canvas = await ocrFileToPreprocessedCanvas(file);
      const {data} = await Tesseract.recognize(canvas, 'eng');
      const guess = guessLineFromOcrText(data.text||'');
      if(guess){ setBrand(guess); notify('✓ Scan කළා — check කරලා අවශ්‍ය නම් edit කරන්න'); }
      else notify('Text කියවගන්න බැරි වුනා — manual විදිහට type කරන්න');
    } catch(err){ console.error(err); notify('Scan එකේ දෝෂයක් — නැවත try කරන්න'); }
    setScanning(false);
  };

  return (
    <div>
      <div className="card">
        <h3>{editingId? '✏️ Edit Item' : '💊 New Item'}</h3>
        <div className="grid c2">
          <div>
            <label>Brand Name (eg: Atorva 10mg)</label>
            <div style={{display:'flex', gap:8}}>
              <input value={brand} onChange={e=>setBrand(e.target.value)} placeholder="Atorva 10mg" style={{flex:1}} />
              <input ref={scanInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={quickScanBrand} />
              <button type="button" className="btn btn-ghost" style={{padding:'0 14px'}} onClick={()=>scanInputRef.current.click()} title="Quick scan box for brand name">
                {scanning? '🔍' : '📷'}
              </button>
            </div>
          </div>
          <div><label>Generic Name</label>
            <input value={generic} onChange={e=>setGeneric(e.target.value)} placeholder="Atorvastatin" list="generic-name-options" />
            <datalist id="generic-name-options">
              {genericOptions.map(g=><option key={g} value={g} />)}
            </datalist>
          </div>
          <div><label>Pack Size (tabs/units per pack)</label>
            <input type="number" value={packSize} onChange={e=>setPackSize(e.target.value)} placeholder="100" /></div>
          <div><label>Unit</label>
            <select value={unit} onChange={e=>setUnit(e.target.value)}>
              <option>tablets</option><option>capsules</option><option>bottles</option>
              <option>feets</option><option>grams</option><option>ml</option><option>units</option>
            </select></div>
          <div><label>Re-Order Level (units) — optional</label>

        <div style={{marginTop:14, display:'flex', gap:10}}>
          <button className="btn btn-primary" disabled={saving} onClick={save}>

          GRN Entry එකෙන් batch එකක් විදිහට එකතු කරන්න. Re-Order Level දුන්නොත්, stock ඒකට වඩා
          අඩු වුනාම Dashboard එකේ "Low Stock" alert එකක් auto-එනවා.

        <h3>Registered Items ({items.length})</h3>
        {items.length===0 ? <div className="empty">Items නැහැ. උඩ form එකෙන් එකතු කරන්න.</div> :
        <table>
          <thead><tr><th>Code</th><th>Brand</th><th>Generic</th><th>Pack Size</th><th>Unit</th><th></th></tr></thead>
          <tbody>
            {items.slice().sort((a,b)=>a.itemNumber<b.itemNumber?-1:1).map(it=>(
              <tr key={it.id}><td>{it.itemNumber}</td><td>{it.brandName}</td><td>{it.genericName}</td>
                <td>{it.packSize}</td><td>{it.unit}</td>
                <td style={{display:'flex', gap:6}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>startEdit(it)}>✏️</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>removeItem(it)}>🗑</button>
                </td></tr>
            ))}
          </tbody>
        </table>}
      </div>
    </div>
  );
}

/* ---------- Customers ---------- */
function Customers({customers, notify}){
  const [f,setF] = useState({name:'',code:'',tel:'',idNo:'',address:'',category:'NC'});
  const [showDebtorsOnly,setShowDebtorsOnly] = useState(false);
  const [payAmounts,setPayAmounts] = useState({});
  const save = async ()=>{
    if(!f.name || !f.tel) return notify('Name සහ Tel No ඕන');
    await db.collection('customers').add({...f, dueAmount:0, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
    notify('Customer saved'); setF({name:'',code:'',tel:'',idNo:'',address:'',category:'NC'});
  };

  const recordPayment = async (c)=>{
    const amt = Number(payAmounts[c.id]);
    if(!amt || amt<=0) return notify('Payment amount එකක් දෙන්න');
    const newDue = Math.max(0, (c.dueAmount||0) - amt);
    await db.collection('customers').doc(c.id).update({dueAmount:newDue});
    await db.collection('payments').add({
      customerId:c.id, customerName:c.name, amount:amt,
      previousDue:c.dueAmount||0, newDue, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    setPayAmounts(p=>({...p,[c.id]:''}));
    notify('Payment recorded — new due: ' + fmt(newDue));
  };

  const debtors = customers.filter(c=>(c.dueAmount||0)>0);
  const totalDue = debtors.reduce((s,c)=>s+(c.dueAmount||0),0);
  const list = showDebtorsOnly ? debtors : customers;

  return (
    <div>
      <div className="card">
        <h3>👥 New Customer</h3>
        <div className="grid c2">
          <div><label>Name</label><input value={f.name} onChange={e=>setF({...f,name:e.target.value})}/></div>
          <div><label>Customer Code</label><input value={f.code} onChange={e=>setF({...f,code:e.target.value})}/></div>
          <div><label>Tel No</label><input value={f.tel} onChange={e=>setF({...f,tel:e.target.value})}/></div>
          <div><label>ID No (optional)</label><input value={f.idNo} onChange={e=>setF({...f,idNo:e.target.value})}/></div>
          <div><label>Category</label>
            <select value={f.category} onChange={e=>setF({...f,category:e.target.value})}>
              <option value="NC">Normal Customer (NC)</option><option value="VIP">Valuable Customer (VIP)</option>
            </select></div>
          <div><label>Address</label><input value={f.address} onChange={e=>setF({...f,address:e.target.value})}/></div>
        </div>
        <button className="btn btn-primary" style={{marginTop:14}} onClick={save}>Save Customer</button>
      </div>

      <div className="card">
        <h3>💳 Debit Customer List <span style={{marginLeft:'auto', fontWeight:400, fontSize:12.5, color:'var(--ink-soft)'}}>Total Due: {fmt(totalDue)}</span></h3>
        <label style={{display:'flex', alignItems:'center', gap:6, marginBottom:12, fontWeight:400}}>
          <input type="checkbox" checked={showDebtorsOnly} onChange={e=>setShowDebtorsOnly(e.target.checked)} style={{width:'auto'}}/>
          Show only customers with due amount
        </label>
        {list.length===0? <div className="empty">{showDebtorsOnly? 'Due ඇති customers නැහැ' : 'Customers නැහැ'}</div> :
        list.map(c=>(
          <div key={c.id} style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:10,
            padding:'10px 4px', borderBottom:'1px solid var(--line)'}}>
            <div>
              <b>{c.name}</b> <span style={{fontSize:12, color:'var(--ink-soft)'}}>({c.tel})</span>
              <div style={{fontSize:12.5, marginTop:2, color:(c.dueAmount||0)>0?'var(--red)':'var(--green)', fontWeight:700}}>
                Total Due: {fmt(c.dueAmount||0)}
              </div>
            </div>
            {(c.dueAmount||0)>0 && (
              <div style={{display:'flex', gap:6, alignItems:'center'}}>
                <input type="number" placeholder="Amount" style={{width:110}}
                  value={payAmounts[c.id]||''} onChange={e=>setPayAmounts(p=>({...p,[c.id]:e.target.value}))}/>
                <button className="btn btn-primary btn-sm" onClick={()=>recordPayment(c)}>💳 Record Payment</button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- GRN Entry (PharmaKo-style: entry strip + Add + running table) ---------- */
async function nextGrnNo(){
  const ref = db.collection('meta').doc('counters');
  return db.runTransaction(async tx=>{
    const snap = await tx.get(ref);
    const cur = snap.exists ? (snap.data().nextGrnNo||1) : 1;
    tx.set(ref, {nextGrnNo: cur+1}, {merge:true});
    return cur;
  });
}

function emptyGrnEntry(){
  return {itemId:'', itemCode:'', itemName:'', unit:'', packSize:0, pktQty:'', pktCost:'', pktSales:'', freeQty:'', expiry:'', looseQty:''};
}

function GRNEntry({items, batches, suppliers, notify}){
  const [supplierId,setSupplierId] = useState('');
  const [invoiceNum,setInvoiceNum] = useState('');
  const [date,setDate] = useState(todayISO());
  const [entry,setEntry] = useState(emptyGrnEntry());
  const [rows,setRows] = useState([]);
  const [discountType,setDiscountType] = useState('amount');
  const [discountVal,setDiscountVal] = useState(0);
  const [payment,setPayment] = useState('cash');
  const [saving,setSaving] = useState(false);
  const itemSearchRef = useRef(null);

  const patchEntry = (p)=> setEntry(e=>({...e,...p}));
  const pickItem = (item)=>{
    patchEntry({itemId:item.id, itemCode:item.itemNumber, itemName:item.brandName, unit:item.unit, packSize:item.packSize});
  };
  const stockFor = (itemId)=> itemId ? batches.filter(b=>b.itemId===itemId).reduce((s,b)=>s+(b.remainingUnits||0),0) : 0;

  const qtyUnits = (Number(entry.pktQty)||0) * (Number(entry.packSize)||0);
  const freeUnits = (Number(entry.freeQty)||0) * (Number(entry.packSize)||0);
  const unitCost = entry.packSize ? (Number(entry.pktCost)||0)/entry.packSize : 0;
  const unitSales = entry.packSize ? (Number(entry.pktSales)||0)/entry.packSize : 0;
  const entryTotalCost = (Number(entry.pktQty)||0) * (Number(entry.pktCost)||0);
  const entryTotalSales = (Number(entry.pktQty)||0) * (Number(entry.pktSales)||0);

  const addRow = ()=>{
    if(!entry.itemId) return notify('Item එකක් තෝරන්න');
    if(!entry.pktQty || !entry.pktCost || !entry.pktSales) return notify('Pkt Qty, Pkt Cost, Pkt Sales පුරවන්න');
    if(!entry.expiry) return notify('Expire Date එක ඕන');
    setRows(rs=>[...rs, {
      ...entry, qtyUnits, freeUnits, unitCost, unitSales,
      totalCost: entryTotalCost, totalSales: entryTotalSales,
    }]);
    setEntry(emptyGrnEntry());
    setTimeout(()=> itemSearchRef.current && itemSearchRef.current.focus(), 0);
  };
  const removeRow = (i)=> setRows(rs=> rs.filter((_,idx)=>idx!==i));

  const grandCost = rows.reduce((s,r)=>s+r.totalCost,0);
  const discountAmount = discountType==='percent' ? grandCost*(Number(discountVal)||0)/100 : (Number(discountVal)||0);
  const grandTotal = Math.max(0, grandCost - discountAmount);

  const resetAll = ()=>{
    setRows([]); setEntry(emptyGrnEntry()); setInvoiceNum(''); setDiscountVal(0); setSupplierId('');
  };

  const save = async ()=>{
    const sup = suppliers.find(s=>s.id===supplierId);
    if(!sup) return notify('Supplier එකක් තෝරන්න');
    if(rows.length===0) return notify('අඩුම තරමින් item එකක් Add කරන්න');
    setSaving(true);
    try{
      const grnNo = 'GRN-' + (await nextGrnNo());
      const grnRef = await db.collection('grns').add({
        grnNo, supplierId, supplierName:sup.name, invoiceNum, date,
        discountType, discountVal:Number(discountVal)||0, discountAmount,
        totalAmount: grandTotal, payment, paid: payment!=='credit',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      for(const r of rows){
        const existingBatches = batches.filter(b=>b.itemId===r.itemId).length + rows.filter(rr=>rr.itemId===r.itemId && rows.indexOf(rr)<rows.indexOf(r)).length;
        const batchCode = batchPrefix(existingBatches) + r.itemCode;
        const totalUnits = r.qtyUnits + r.freeUnits;
        await db.collection('batches').add({
          batchCode, itemId:r.itemId, brandName:r.itemName,
          costPricePerPack:Number(r.pktCost), sellPricePerPack:Number(r.pktSales),
          unitCost:r.unitCost, unitSell:r.unitSales,
          expiryDate:r.expiry, qtyPacks:Number(r.pktQty), freePacks:Number(r.freeQty)||0,
          qtyUnits: totalUnits, remainingUnits: totalUnits,
          supplierId, supplierName:sup.name, grnId:grnRef.id, grnNo, invoiceNum,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      }
      notify('✓ ' + grnNo + ' saved — stock updated');
      resetAll();
    } finally { setSaving(false); }
  };

  return (
    <div>
      <div className="card">
        <h3>📦 Purchase / GRN Entry</h3>
        <div className="grid c3">
          <div><label>Supplier</label>
            <select value={supplierId} onChange={e=>setSupplierId(e.target.value)}>
              <option value="">-- Select --</option>
              {suppliers.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
            </select></div>
          <div><label>Supplier Invoice No</label><input value={invoiceNum} onChange={e=>setInvoiceNum(e.target.value)} /></div>
          <div><label>Bill Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} /></div>
        </div>
      </div>

      <div className="card" style={{background:'var(--teal-100)', border:'1.5px solid var(--teal-500)'}}>
        <h3 style={{color:'var(--accent)'}}>➕ Add Item</h3>
        <GrnEntryStrip entry={entry} patchEntry={patchEntry} pickItem={pickItem} items={items}
          stockFor={stockFor} qtyUnits={qtyUnits} freeUnits={freeUnits} unitCost={unitCost} unitSales={unitSales}
          entryTotalCost={entryTotalCost} itemSearchRef={itemSearchRef} onAdd={addRow} notify={notify} />
        <div style={{display:'flex', gap:10, marginTop:14}}>
          <button className="btn btn-primary" onClick={addRow}>+ Add</button>
          <button className="btn btn-ghost" onClick={()=>setEntry(emptyGrnEntry())}>Clear</button>
        </div>
      </div>

      <div className="card">
        <h3>Items in this GRN ({rows.length})</h3>
        {rows.length===0 ? <div className="empty">තවම items add කරලා නැහැ — උඩ form එකෙන් item එකක් Add කරන්න.</div> :
        <div style={{overflowX:'auto'}}>
          <table>
            <thead><tr>
              <th>No</th><th>Code</th><th>Item Name</th><th>Unit</th><th>Pkt Qty</th><th>Free</th>
              <th>Pkt Cost</th><th>Pkt Sales</th><th>Total Cost</th><th>Expiry</th><th></th>
            </tr></thead>
            <tbody>
              {rows.map((r,i)=>(
                <tr key={i}>
                  <td>{i+1}</td><td>{r.itemCode}</td><td>{r.itemName}</td><td>{r.unit}</td>
                  <td>{r.pktQty}</td><td>{r.freeQty||0}</td>
                  <td>{Number(r.pktCost).toFixed(2)}</td><td>{Number(r.pktSales).toFixed(2)}</td>
                  <td>{fmt(r.totalCost)}</td><td>{r.expiry}</td>
                  <td><button className="btn btn-danger btn-sm" onClick={()=>removeRow(i)}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>}

        <div className="grid c4" style={{marginTop:18}}>
          <div><label>Discount type</label>
            <select value={discountType} onChange={e=>setDiscountType(e.target.value)}>
              <option value="amount">Amount (Rs.)</option><option value="percent">Percent (%)</option>
            </select></div>
          <div><label>Discount value</label><input type="number" value={discountVal} onChange={e=>setDiscountVal(e.target.value)} /></div>
          <div><label>Payment</label>
            <select value={payment} onChange={e=>setPayment(e.target.value)}>
              <option value="cash">Cash</option><option value="credit">Credit</option>
            </select></div>
          <div>
            <label>No of items: {rows.length}</label>
            <div style={{fontWeight:700, fontSize:18, color:'var(--accent)'}}>{fmt(grandTotal)}</div>
          </div>
        </div>
        <button className="btn btn-primary" style={{marginTop:16}} disabled={saving} onClick={save}>
          {saving? 'Saving…':'💾 Save GRN & Update Stock'}
        </button>
      </div>
    </div>
  );
}

/* ---------- Opening Stock (initial stock migration — not a real purchase) ---------- */
function OpeningStock({items, batches, notify}){
  const [date,setDate] = useState(todayISO());
  const [entry,setEntry] = useState(emptyOpeningEntry());
  const [rows,setRows] = useState([]);
  const [saving,setSaving] = useState(false);
  const itemSearchRef = useRef(null);

  const patchEntry = (p)=> setEntry(e=>({...e,...p}));
  const pickItem = (item)=>{
    patchEntry({itemId:item.id, itemCode:item.itemNumber, itemName:item.brandName, unit:item.unit, packSize:item.packSize});
  };
  const stockFor = (itemId)=> itemId ? batches.filter(b=>b.itemId===itemId).reduce((s,b)=>s+(b.remainingUnits||0),0) : 0;

  const qtyUnits = (Number(entry.pktQty)||0) * (Number(entry.packSize)||0) + (Number(entry.looseQty)||0);
  const entryTotalCost = qtyUnits * (Number(entry.unitCost)||0);

  const addRow = ()=>{
    if(!entry.itemId) return notify('Item එකක් තෝරන්න');
    if(!entry.pktQty && !entry.looseQty) return notify('Pkt Qty හෝ Loose units වලින් එකක් වත් දෙන්න');
    if(!entry.unitCost || !entry.unitSell) return notify('Unit Cost, Unit Sell දෙන්න');
    if(!entry.expiry) return notify('Expire Date එක ඕන (දන්නේ නැත්නම් approximate දිනයක් දෙන්න)');
    setRows(rs=>[...rs, {...entry, qtyUnits, totalCost: entryTotalCost}]);
    setEntry(emptyOpeningEntry());
    setTimeout(()=> itemSearchRef.current && itemSearchRef.current.focus(), 0);
  };
  const removeRow = (i)=> setRows(rs=> rs.filter((_,idx)=>idx!==i));

  const grandCost = rows.reduce((s,r)=>s+r.totalCost,0);
  const resetAll = ()=>{ setRows([]); setEntry(emptyOpeningEntry()); };

  const save = async ()=>{
    if(rows.length===0) return notify('අඩුම තරමින් item එකක් Add කරන්න');
    setSaving(true);
    try{
      for(const r of rows){
        const existingBatches = batches.filter(b=>b.itemId===r.itemId).length + rows.filter(rr=>rr.itemId===r.itemId && rows.indexOf(rr)<rows.indexOf(r)).length;
        const batchCode = batchPrefix(existingBatches) + r.itemCode;
        await db.collection('batches').add({
          batchCode, itemId:r.itemId, brandName:r.itemName,
          costPricePerPack: (Number(r.unitCost)||0)*(Number(r.packSize)||1),
          sellPricePerPack: (Number(r.unitSell)||0)*(Number(r.packSize)||1),
          unitCost:Number(r.unitCost)||0, unitSell:Number(r.unitSell)||0,
          expiryDate:r.expiry, qtyPacks:Number(r.pktQty)||0, freePacks:0, looseQty:Number(r.looseQty)||0,
          qtyUnits: r.qtyUnits, remainingUnits: r.qtyUnits,
          supplierId:'', supplierName:'Opening Stock', grnId:null, grnNo:'', invoiceNum:'',
          isOpeningStock:true, openingDate:date,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      }
      notify('✓ Opening stock saved — ' + rows.length + ' item(s), stock updated');
      resetAll();
    } finally { setSaving(false); }
  };

  return (
    <div>
      <div className="card">
        <h3>📥 Opening Stock</h3>
        <p style={{fontSize:12.5, color:'var(--ink-soft)', marginTop:-6}}>
          දැනට තියෙන stock (system එක start කරන්න කලින් තිබ්බ ඖෂධ ප්‍රමාණය) ඇතුළත් කරන්න.
          මේක GRN එකක් නෙවෙයි — Supplier/Purchasing reports වලට add වෙන්නේ නෑ, ඒත් Stock/Dashboard/Bills වලට
          සාමාන්‍ය batch එකක් විදිහටම ගණන් ගැනේ.
        </p>
        <p style={{fontSize:12, color:'var(--accent-2)', marginTop:8}}>
          💡 <b>Item එකකට pack කීපයක්, expiry date එකින් එක වෙනස්</b> නම් — ඒ item එකම කීප වතාවක් Add කරන්න
          (එකින් එකට හරියටම Pkt Qty/Loose + Expiry Date එකම දෙන්න). හැම "Add" එකකින්ම වෙනම batch එකක් හැදෙනවා, විකුණුම්වලදී
          කල් ඉකුත්වීමට ළඟම batch එකෙන්ම auto-මුලින්ම අඩු වෙනවා (FEFO).

        <h3>Opening Stock Items ({rows.length})</h3>
        {rows.length===0 ? <div className="empty">තවම items add කරලා නැහැ — උඩ form එකෙන් item එකක් Add කරන්න.</div> :
        <div style={{overflowX:'auto'}}>
          <table>
            <thead><tr>
              <th>No</th><th>Code</th><th>Item Name</th><th>Unit</th><th>Pkt Qty</th><th>Loose</th>
              <th>Total Qty</th><th>Unit Cost</th><th>Unit Sell</th><th>Total Cost</th><th>Expiry</th><th></th>

          {saving? 'Saving…':'💾 Save Opening Stock'}
        </button>
      </div>
    </div>
  );
}

function emptyOpeningEntry(){
  return {itemId:'', itemCode:'', itemName:'', unit:'', packSize:0, pktQty:'', looseQty:'', unitCost:'', unitSell:'', expiry:''};
}

function OpeningStockEntryStrip({entry, patchEntry, pickItem, items, stockFor, qtyUnits, entryTotalCost, itemSearchRef, onAdd, notify}){
  const [query,setQuery] = useState('');
  const [open,setOpen] = useState(false);
  const [hi,setHi] = useState(0);
  const matches = query.length>0 ? items.filter(it=>it.brandName.toLowerCase().includes(query.toLowerCase()) || it.itemNumber.includes(query)).slice(0,8) : [];
  const pktQtyRef = useRef(null), looseRef=useRef(null), costRef=useRef(null), sellRef=useRef(null), expRef=useRef(null);

  useEffect(()=>{ if(!entry.itemId) setQuery(''); },[entry.itemId]);

  const choose = (item)=>{ pickItem(item); setQuery(item.brandName); setOpen(false); setTimeout(()=>pktQtyRef.current && pktQtyRef.current.focus(),0); };
  const onKey = (e)=>{
    if(!open || matches.length===0) return;
    if(e.key==='ArrowDown'){ e.preventDefault(); setHi(h=>Math.min(h+1, matches.length-1)); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); setHi(h=>Math.max(h-1,0)); }
    else if(e.key==='Enter'){ e.preventDefault(); choose(matches[hi]); }
  };

  return (
    <div>
      <div className="grid c2">
        <div className="autocomplete">
          <label>Item Code / Item Name</label>

            <input ref={itemSearchRef} value={entry.itemId ? (entry.itemCode+' — '+entry.itemName) : query} style={{flex:1}}
              onChange={e=>{ setQuery(e.target.value); setOpen(true); setHi(0); if(entry.itemId) patchEntry({itemId:'',itemCode:'',itemName:'',unit:'',packSize:0}); }}
              onKeyDown={onKey} onFocus={()=>{setOpen(true); if(entry.itemId){ setQuery(entry.itemName); patchEntry({itemId:'',itemCode:'',itemName:'',unit:'',packSize:0}); } }}
              onBlur={()=>setTimeout(()=>setOpen(false),150)} placeholder="type code or brand name..." />
            <ItemScanButton items={items} notify={notify}
              onMatch={(item)=>choose(item)}
              onGuess={(text)=>{ setQuery(text); setOpen(true); }} />
          </div>
          {open && matches.length>0 && (
            <div className="ac-list">
              {matches.map((m,i)=>(
                <div key={m.id} className={"ac-item"+(i===hi?" hi":"")} onMouseDown={()=>choose(m)}>
                  <b>{m.itemNumber}</b> — {m.brandName} <span style={{color:'var(--ink-soft)'}}>({m.genericName})</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <div><label>Expire Date</label>
          <input ref={expRef} type="date" value={entry.expiry} onChange={e=>patchEntry({expiry:e.target.value})} /></div>
      </div>

      <div className="grid c4" style={{marginTop:12}}>
        <div><label>Pack Size (auto)</label><input readOnly style={{background:'var(--card)'}} value={entry.packSize||''} /></div>
        <div><label>Pkt Qty (full packs)</label><input ref={pktQtyRef} type="number" value={entry.pktQty} onChange={e=>patchEntry({pktQty:e.target.value})}
          onKeyDown={e=>e.key==='Enter' && looseRef.current.focus()} /></div>
        <div><label>Loose units (packs වලින් එළියේ)</label><input ref={looseRef} type="number" value={entry.looseQty} onChange={e=>patchEntry({looseQty:e.target.value})}
          onKeyDown={e=>e.key==='Enter' && costRef.current.focus()} placeholder="e.g. 7" /></div>
        <div><label>Stock (current)</label><input readOnly style={{background:'var(--card)'}} value={entry.itemId? stockFor(entry.itemId):0} /></div>
      </div>

      <div className="grid c3" style={{marginTop:12}}>
        <div><label>Unit Cost (Rs.)</label><input ref={costRef} type="number" value={entry.unitCost} onChange={e=>patchEntry({unitCost:e.target.value})}
          onKeyDown={e=>e.key==='Enter' && sellRef.current.focus()} placeholder="e.g. 19.25" /></div>
        <div><label>Unit Sell (Rs.)</label><input ref={sellRef} type="number" value={entry.unitSell} onChange={e=>patchEntry({unitSell:e.target.value})}
          onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); expRef.current.focus(); } }} placeholder="e.g. 22.14" /></div>
        <div><label>Total Qty (units)</label><input readOnly style={{background:'var(--card)'}} value={qtyUnits} /></div>
      </div>

      <div className="grid c3" style={{marginTop:12}}>
        <div><label>Amount (Rs.)</label><input readOnly style={{background:'var(--card)', fontWeight:700}} value={entryTotalCost.toFixed(2)} /></div>
      </div>
    </div>
  );
}

/* ---------- New Bill (PharmaKo-style: entry strip + Add + running table) ---------- */
function emptyBillEntry(){ return {itemId:'', itemCode:'', brandName:'', unit:'', qty:'', unitPrice:''}; }

function NewBill({items, batches, customers, notify, staffUser, prefill, clearPrefill}){
  const [customerId,setCustomerId] = useState('');
  const [custQuery,setCustQuery] = useState('');
  const [custOpen,setCustOpen] = useState(false);
  const [walkIn,setWalkIn] = useState(false);
  const [custName,setCustName] = useState('');
  const [custTel,setCustTel] = useState('');
  const [entry,setEntry] = useState(emptyBillEntry());
  const [rows,setRows] = useState([]);
  const [discountType,setDiscountType] = useState('amount'); // 'amount' | 'percent'
  const [discountVal,setDiscountVal] = useState(0);
  const [otherCharges,setOtherCharges] = useState(0);
  const [payment,setPayment] = useState('cash');
  const [saving,setSaving] = useState(false);
  const [savedBill,setSavedBill] = useState(null);
  const itemSearchRef = useRef(null);

  useEffect(()=>{
    if(prefill){
      const existing = customers.find(c=> c.tel===prefill.customerTel);
      if(existing){ setCustomerId(existing.id); setCustQuery(existing.name); setWalkIn(false); }
      else { setWalkIn(true); setCustName(prefill.customerName||''); setCustTel(prefill.customerTel||''); }
      setPayment('credit'); // "to be paid" — shows as a due amount until settled
      notify && notify('📋 ' + (prefill.customerName||'Customer') + ' ගේ prescription/voice request එකෙන් bill එක හදනවා — items add කරන්න');
      clearPrefill && clearPrefill();
    }
    // eslint-disable-next-line
  },[prefill]);

  const selectedCustomer = customers.find(c=>c.id===customerId);
  const custMatches = custQuery.length>0 ? customers.filter(c=>
      c.name.toLowerCase().includes(custQuery.toLowerCase()) || (c.tel||'').includes(custQuery)
    ).slice(0,8) : [];

  const priceFor = (itemId)=>{
    const bs = batches.filter(b=>b.itemId===itemId && b.remainingUnits>0).sort((a,b)=>(a.expiryDate||'')<(b.expiryDate||'')?-1:1);
    return bs[0]? Number(bs[0].unitSell).toFixed(2) : '0.00';
  };
  const stockFor = (itemId)=> itemId ? batches.filter(b=>b.itemId===itemId).reduce((s,b)=>s+(b.remainingUnits||0),0) : 0;

  const patchEntry = (p)=> setEntry(e=>({...e,...p}));
  const pickItem = (item)=>{
    patchEntry({itemId:item.id, itemCode:item.itemNumber, brandName:item.brandName, unit:item.unit, unitPrice:priceFor(item.id)});
  };

  const entryTotal = (Number(entry.qty)||0) * (Number(entry.unitPrice)||0);

  const addRow = ()=>{
    if(!entry.itemId) return notify('Item එකක් තෝරන්න');
    if(!entry.qty || Number(entry.qty)<=0) return notify('Qty එක ඕන');
    if(Number(entry.qty) > stockFor(entry.itemId)) return notify(entry.brandName + ' — stock එකේ ඇති ප්‍රමාණයට වඩා වැඩියි');
    setRows(rs=>[...rs, {...entry, qty:Number(entry.qty), unitPrice:Number(entry.unitPrice), lineTotal: entryTotal}]);
    setEntry(emptyBillEntry());
    setTimeout(()=> itemSearchRef.current && itemSearchRef.current.focus(), 0);
  };
  const removeRow = (i)=> setRows(rs=> rs.filter((_,idx)=>idx!==i));

  const subtotal = rows.reduce((s,r)=>s+r.lineTotal,0);
  const discountAmount = discountType==='percent' ? subtotal*(Number(discountVal)||0)/100 : (Number(discountVal)||0);
  const totalToPay = Math.max(0, subtotal - discountAmount + (Number(otherCharges)||0));

  const resetBill = ()=>{
    setRows([]); setEntry(emptyBillEntry()); setDiscountVal(0); setOtherCharges(0); setPayment('cash');
    setCustomerId(''); setCustQuery(''); setCustName(''); setCustTel(''); setWalkIn(false); setSavedBill(null);
  };

  const save = async ()=>{
    const name = walkIn ? custName : (selectedCustomer? selectedCustomer.name : custName);
    const tel = walkIn ? custTel : (selectedCustomer? selectedCustomer.tel : custTel);
    if(!name) return notify('Customer name එක ඕන');
    if(rows.length===0) return notify('අඩුම තරමින් item එකක් Add කරන්න');
    setSaving(true);
    try{
      const billNo = 'INV-' + (await nextBillNo());
      const avgUnitCost = (itemId)=>{
        const relevant = batches.filter(b=>b.itemId===itemId && b.remainingUnits>0);
        if(relevant.length===0) return 0;
        const totalUnits = relevant.reduce((s,b)=>s+b.remainingUnits,0);
        const totalCost = relevant.reduce((s,b)=>s+b.remainingUnits*(b.unitCost||0),0);
        return totalUnits>0 ? totalCost/totalUnits : 0;
      };
      const invoiceLines = rows.map(r=>{
        const unitCost = avgUnitCost(r.itemId);
        return {
          itemId:r.itemId, itemCode:r.itemCode, brandName:r.brandName, unit:r.unit,
          qty:r.qty, unitPrice:r.unitPrice, lineTotal:r.lineTotal,
          unitCost, costTotal: unitCost*r.qty,
        };
      });
      for(const l of invoiceLines){
        await deductStockFEFO(l.itemId, l.qty, batches);
      }
      let customerIdForDue = customerId;
      if(payment==='credit' && !customerIdForDue && tel){
        // walk-in but sold on credit (e.g. converted from a prescription request) — register so the due amount can be tracked
        const dup = customers.find(c=>c.tel===tel);
        if(dup) customerIdForDue = dup.id;
        else {
          const ref = await db.collection('customers').add({
            name, tel, code:'', idNo:'', address:'', category:'NC', dueAmount:0,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          customerIdForDue = ref.id;
        }
      }
      if(payment==='credit' && customerIdForDue){
        const custRef = db.collection('customers').doc(customerIdForDue);
        const custSnap = await custRef.get();
        const currentDue = custSnap.exists ? (custSnap.data().dueAmount||0) : 0;
        await custRef.update({dueAmount: currentDue + totalToPay});
      }
      const invoiceData = {
        billNo, customerId: customerIdForDue||null, customerName:name, customerTel:tel||'',
        items: invoiceLines, subtotal, discountType, discountVal:Number(discountVal)||0, discountAmount,
        otherCharges:Number(otherCharges)||0, totalToPay, payment, staffName: staffUser?.name||'',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(), createdAtMs: Date.now(),
      };
      await db.collection('invoices').add(invoiceData);
      notify('✓ Bill ' + billNo + ' saved — stock & accounts updated');
      setSavedBill(invoiceData);
    } finally { setSaving(false); }
  };

  const printBill = (inv)=>{
    const w = window.open('', '_blank');
    const rowsHtml = inv.items.map(it=>`<tr><td>${it.brandName}</td><td style="text-align:center">${it.qty}</td><td style="text-align:right">${it.unitPrice.toFixed(2)}</td><td style="text-align:right">${it.lineTotal.toFixed(2)}</td></tr>`).join('');
    w.document.write(`
      <html><head><title>${inv.billNo}</title>
      <style>
        body{font-family:monospace; padding:16px; max-width:340px; margin:0 auto;}
        h2{text-align:center; margin:0 0 2px;} p{margin:2px 0; font-size:12.5px;}
        table{width:100%; border-collapse:collapse; margin-top:10px; font-size:12.5px;}
        th,td{padding:4px 2px; border-bottom:1px dashed #999;}
        .tot{display:flex; justify-content:space-between; font-size:12.5px; margin-top:4px;}
        .grand{font-weight:bold; font-size:15px; border-top:1px solid #000; padding-top:6px; margin-top:6px;}
        hr{border:none; border-top:1px dashed #999;}
      </style></head><body>
      <h2>Sesanda Pharmacy</h2>
      <p style="text-align:center">${inv.billNo} — ${new Date().toLocaleString()}</p>
      <hr/>
      <p>Customer: ${inv.customerName}</p>
      <p>Tel: ${inv.customerTel||'-'}</p>
      <hr/>
      <table><thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead><tbody>${rowsHtml}</tbody></table>
      <hr/>
      <div class="tot"><span>Subtotal</span><span>${inv.subtotal.toFixed(2)}</span></div>
      <div class="tot"><span>Discount</span><span>-${inv.discountAmount.toFixed(2)}</span></div>
      <div class="tot"><span>Other charges</span><span>${inv.otherCharges.toFixed(2)}</span></div>
      <div class="tot grand"><span>Total (${inv.payment})</span><span>Rs. ${inv.totalToPay.toFixed(2)}</span></div>
      <p style="text-align:center; margin-top:14px;">ස්තුතියි!</p>
      <script>window.print();<\/script>
      </body></html>`);
    w.document.close();
  };

  const sendWhatsApp = (inv)=>{
    if(!inv.customerTel) return notify('Customer tel number නැහැ');
    const lines = inv.items.map(it=>`${it.brandName} x${it.qty} — Rs.${it.lineTotal.toFixed(2)}`).join('\n');

function BillEntryStrip({entry, patchEntry, pickItem, items, stockFor, entryTotal, itemSearchRef, onAdd, notify}){
  const [query,setQuery] = useState('');
  const [open,setOpen] = useState(false);
  const [hi,setHi] = useState(0);
  const matches = query.length>0 ? items.filter(it=>it.brandName.toLowerCase().includes(query.toLowerCase()) || it.itemNumber.includes(query)).slice(0,8) : [];
  const qtyRef = useRef(null), priceRef=useRef(null);

  useEffect(()=>{ if(!entry.itemId) setQuery(''); },[entry.itemId]);

  const choose = (item)=>{ pickItem(item); setQuery(item.brandName); setOpen(false); setTimeout(()=>qtyRef.current && qtyRef.current.focus(),0); };
  const onKey = (e)=>{
    if(!open || matches.length===0) return;
    if(e.key==='ArrowDown'){ e.preventDefault(); setHi(h=>Math.min(h+1, matches.length-1)); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); setHi(h=>Math.max(h-1,0)); }
    else if(e.key==='Enter'){ e.preventDefault(); choose(matches[hi]); }
  };
  const stock = entry.itemId ? stockFor(entry.itemId) : null;

  return (
    <div>
      <div className="autocomplete">
        <label>Item Code / Item Name</label>
        <div style={{display:'flex', gap:8}}>
          <input ref={itemSearchRef} value={entry.itemId ? (entry.itemCode+' — '+entry.brandName) : query} style={{flex:1}}
            onChange={e=>{ setQuery(e.target.value); setOpen(true); setHi(0); if(entry.itemId) patchEntry({itemId:'',itemCode:'',brandName:'',unit:'',unitPrice:''}); }}
            onKeyDown={onKey} onFocus={()=>{setOpen(true); if(entry.itemId){ setQuery(entry.brandName); patchEntry({itemId:'',itemCode:'',brandName:'',unit:'',unitPrice:''}); } }}
            onBlur={()=>setTimeout(()=>setOpen(false),150)} placeholder="type code or brand name..." autoComplete="off" />
          <ItemScanButton items={items} notify={notify}
            onMatch={(item)=>choose(item)}
            onGuess={(text)=>{ setQuery(text); setOpen(true); }} />
        </div>
        {open && matches.length>0 && (
          <div className="ac-list">
            {matches.map((m,i)=>(
              <div key={m.id} className={"ac-item"+(i===hi?" hi":"")} onMouseDown={()=>choose(m)}>
                <b>{m.itemNumber}</b> — {m.brandName} <span style={{color:'var(--ink-soft)'}}>({m.genericName})</span>
              </div>
            ))}
          </div>
        )}
        {stock!==null && <div style={{fontSize:11, color: stock<=0?'var(--red)':'var(--ink-soft)', marginTop:3}}>Stock: {stock}</div>}
      </div>
      <div className="grid c3" style={{marginTop:12}}>
        <div><label>Qty</label>
          <input ref={qtyRef} type="number" value={entry.qty} onChange={e=>patchEntry({qty:e.target.value})}
            onKeyDown={e=>e.key==='Enter' && priceRef.current.focus()} /></div>
        <div><label>Unit Price (Rs.)</label>
          <input ref={priceRef} type="number" value={entry.unitPrice} onChange={e=>patchEntry({unitPrice:e.target.value})}
            onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); onAdd(); } }} /></div>
        <div><label>Amount</label><input readOnly style={{background:'var(--card)', fontWeight:700}} value={entryTotal.toFixed(2)} /></div>
      </div>
    </div>
  );
}

/* ---------- Stock View ---------- */
function StockView({items, batches}){
  const rows = items.map(it=>{
    const bs = batches.filter(b=>b.itemId===it.id);
    const rem = bs.reduce((s,b)=>s+(b.remainingUnits||0),0);
    const nearestExpiry = bs.filter(b=>b.remainingUnits>0).map(b=>b.expiryDate).sort()[0];
    return {...it, rem, batchCount:bs.length, nearestExpiry};
  }).sort((a,b)=>a.brandName<b.brandName?-1:1);

  return (
    <div className="card">
      <h3>📋 Current Stock</h3>
      {rows.length===0? <div className="empty">Stock data නැහැ</div> :
      <table>
        <thead><tr><th>Code</th><th>Brand</th><th>Generic</th><th>Batches</th><th>Units Left</th><th>Nearest Expiry</th><th>Status</th></tr></thead>
        <tbody>
          {rows.map(r=>{
            const status = r.rem===0? 'out' : r.rem<=20 ? 'low' : 'ok';
            return (
              <tr key={r.id}>
                <td>{r.itemNumber}</td><td>{r.brandName}</td><td>{r.genericName}</td>
                <td>{r.batchCount}</td><td>{r.rem} {r.unit}</td><td>{r.nearestExpiry||'—'}</td>
                <td><span className={"tag "+status}>{status==='ok'?'In stock':status==='low'?'Low':'Out'}</span></td>
              </tr>
            );
          })}
        </tbody>
      </table>}
    </div>
  );
}

/* ---------- Pending Orders (staff side) ---------- */
const ORDER_STAGES = [
  {id:'ordered', label:'Ordered', ic:'🔔'},
  {id:'processing', label:'Processing/Packing', ic:'📦'},
  {id:'ready', label:'Ready/Dispatched', ic:'🚚'},
  {id:'completed', label:'Paid & Completed', ic:'✅'},
];

function OrdersBoard({orders, items, batches, notify}){
  const [activeStage,setActiveStage] = useState('ordered');
  const counts = Object.fromEntries(ORDER_STAGES.map(s=>[s.id, orders.filter(o=>o.status===s.id).length]));
  const list = orders.filter(o=>o.status===activeStage)
    .sort((a,b)=> activeStage==='completed' ? (b.createdAtMs||0)-(a.createdAtMs||0) : (a.createdAtMs||0)-(b.createdAtMs||0))
    .slice(0, activeStage==='completed'?20:200);

  const advance = async (order, nextStatus)=>{
    if(nextStatus==='ready'){
      // stock is physically pulled when packed/dispatched — deduct FEFO here
      for(const line of order.items){
        let remainingToDeduct = line.qty;
        const relevantBatches = batches.filter(b=>b.itemId===line.itemId && b.remainingUnits>0)
          .sort((a,b)=> (a.expiryDate||'')<(b.expiryDate||'')?-1:1);
        for(const b of relevantBatches){
          if(remainingToDeduct<=0) break;
          const take = Math.min(b.remainingUnits, remainingToDeduct);
          await db.collection('batches').doc(b.id).update({remainingUnits: b.remainingUnits - take});
          remainingToDeduct -= take;
        }
      }
    }
    await db.collection('orders').doc(order.id).update({status:nextStatus, [nextStatus+'At']: firebase.firestore.FieldValue.serverTimestamp()});
    notify('Order → ' + ORDER_STAGES.find(s=>s.id===nextStatus)?.label);
  };

  const nextStageOf = (stage)=>{
    const idx = ORDER_STAGES.findIndex(s=>s.id===stage);
    return idx>=0 && idx<ORDER_STAGES.length-1 ? ORDER_STAGES[idx+1].id : null;
  };
  const actionLabel = {processing:'▶ Start Processing', ready:'📦 Mark Ready / Dispatched', completed:'✅ Mark Paid & Completed'};

  return (
    <div>
      <div className="card" style={{display:'flex', gap:8, flexWrap:'wrap'}}>
        {ORDER_STAGES.map(s=>(
          <button key={s.id} className={"btn btn-sm "+(activeStage===s.id?'btn-primary':'btn-ghost')} onClick={()=>setActiveStage(s.id)}>
            {s.ic} {s.label} ({counts[s.id]||0})
          </button>
        ))}
      </div>
      <div className="card">
        {list.length===0? <div className="empty">මේ stage එකේ orders නැහැ</div> :
        list.map(o=>{
          const next = nextStageOf(o.status);
          return (
            <div key={o.id} style={{border:'1px solid var(--line)', borderRadius:12, padding:14, marginBottom:12}}>
              <div style={{display:'flex', justifyContent:'space-between'}}>
                <b>{o.customerName}</b>
                <span className={"tag "+(o.status==='ordered'?'pending':o.status==='completed'?'done':'low')}>
                  {ORDER_STAGES.find(s=>s.id===o.status)?.label}
                </span>
              </div>
              <div style={{fontSize:12, color:'var(--ink-soft)', margin:'4px 0 10px'}}>{o.customerTel}</div>
              <table><tbody>
                {o.items.map((it,i)=>(
                  <tr key={i}><td>{it.brandName}</td><td>x{it.qty}</td><td>{fmt(it.lineTotal)}</td></tr>
                ))}
              </tbody></table>
              <div style={{textAlign:'right', fontWeight:700, marginTop:6}}>Total: {fmt(o.totalAmount)}</div>
              {next && <button className="btn btn-primary btn-sm" style={{marginTop:8}} onClick={()=>advance(o,next)}>{actionLabel[next]}</button>}
            </div>
          );
        })}
      </div>
    </div>
  );
}
